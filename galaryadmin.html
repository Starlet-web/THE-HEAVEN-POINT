<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THP Gallery Admin | Upload Photos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --navy: #1a2a4a; --blue: #1e5fbb; --gold: #b8860b; --white: #fff;
            --gray-50: #f8f9fa; --gray-100: #f1f3f5; --gray-200: #e9ecef;
            --gray-500: #6c757d; --gray-600: #495057; --gray-800: #212529;
            --green: #2b8a3e; --red: #c92a2a; --radius: 10px; --shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; color: var(--gray-800); padding: 24px; min-height: 100vh; }
        .container { max-width: 1100px; margin: 0 auto; }
        
        .header { background: var(--navy); color: white; padding: 20px 24px; border-radius: var(--radius); margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
        .header h1 { font-size: 1.5rem; display: flex; align-items: center; gap: 10px; }
        .header h1 i { color: var(--gold); }
        .header .stats { display: flex; gap: 20px; }
        .header .stats .stat { text-align: center; }
        .header .stats .stat .num { font-size: 1.5rem; font-weight: 800; }
        .header .stats .stat .lbl { font-size: 0.65rem; text-transform: uppercase; opacity: 0.7; }

        .card { background: white; border-radius: var(--radius); padding: 24px; margin-bottom: 20px; box-shadow: var(--shadow); border: 1px solid var(--gray-200); }

        .upload-zone { border: 3px dashed #cbd5e1; border-radius: var(--radius); padding: 50px 24px; text-align: center; cursor: pointer; transition: 0.2s; background: #fafbfc; position: relative; }
        .upload-zone:hover { border-color: var(--blue); background: #f0f6ff; }
        .upload-zone.dragover { border-color: var(--green); background: #f0fdf4; }
        .upload-zone i { font-size: 3rem; color: var(--blue); margin-bottom: 12px; display: block; }
        .upload-zone p { color: var(--gray-600); font-weight: 500; }
        .upload-zone small { color: var(--gray-500); }
        .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

        .previews { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; margin-top: 16px; }
        .preview-item { position: relative; border-radius: 8px; overflow: hidden; aspect-ratio: 4/3; border: 2px solid var(--gray-200); background: #f1f5f9; }
        .preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .preview-item .remove { position: absolute; top: 4px; right: 4px; width: 24px; height: 24px; border-radius: 50%; background: var(--red); color: white; border: none; cursor: pointer; font-size: 0.65rem; display: flex; align-items: center; justify-content: center; }
        .preview-item .status { position: absolute; bottom: 4px; left: 4px; font-size: 0.6rem; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
        .preview-item .status.pending { background: #fef3c7; color: #92400e; }
        .preview-item .status.uploading { background: #dbeafe; color: #1e40af; }
        .preview-item .status.done { background: #dcfce7; color: #166534; }

        .progress-wrap { margin-top: 16px; display: none; }
        .progress-wrap.active { display: block; }
        .progress-bar { background: #e2e8f0; border-radius: 10px; height: 10px; overflow: hidden; }
        .progress-fill { background: var(--blue); height: 100%; border-radius: 10px; transition: width 0.3s; width: 0%; }
        .progress-text { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--gray-500); margin-bottom: 4px; }

        .btn { padding: 12px 24px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; font-family: inherit; }
        .btn-primary { background: var(--blue); color: white; } .btn-primary:hover { filter: brightness(1.1); }
        .btn-gold { background: var(--gold); color: white; } .btn-gold:hover { filter: brightness(1.1); }
        .btn-danger { background: var(--red); color: white; }
        .btn-outline { background: white; border: 2px solid var(--gray-200); color: var(--gray-800); } .btn-outline:hover { background: var(--gray-50); }
        .btn-sm { padding: 6px 12px; font-size: 0.75rem; }
        .btn:disabled { opacity: 0.5; pointer-events: none; }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .gallery-item { position: relative; border-radius: 8px; overflow: hidden; aspect-ratio: 4/3; border: 2px solid var(--gray-200); background: #f1f5f9; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .gallery-item .actions { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.7); padding: 6px; display: flex; justify-content: center; gap: 6px; opacity: 0; transition: 0.2s; }
        .gallery-item:hover .actions { opacity: 1; }

        .alert { padding: 12px 18px; border-radius: 8px; margin-bottom: 16px; font-weight: 500; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }
        .alert-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

        @media (max-width: 600px) {
            body { padding: 12px; }
            .header { padding: 16px; }
            .header h1 { font-size: 1.2rem; }
            .card { padding: 16px; }
            .upload-zone { padding: 30px 16px; }
            .gallery-grid { grid-template-columns: repeat(3, 1fr); }
            .previews { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <h1><i class="fas fa-images"></i> THP Gallery Admin</h1>
            <div class="stats">
                <div class="stat"><div class="num" id="totalImages">0</div><div class="lbl">Total Photos</div></div>
            </div>
        </div>

        <div id="alertBox"></div>

        <!-- UPLOAD CARD -->
        <div class="card">
            <h2 style="font-size:1.1rem;margin-bottom:16px;display:flex;align-items:center;gap:8px;"><i class="fas fa-cloud-upload-alt" style="color:var(--blue);"></i> Upload New Photos</h2>
            
            <div class="upload-zone" id="uploadZone">
                <input type="file" id="fileInput" accept="image/*" multiple onchange="handleFiles(this)">
                <i class="fas fa-images"></i>
                <p>Click to select photos or drag & drop here</p>
                <small>JPG, PNG, WebP • Max 32MB each • Multiple allowed</small>
            </div>

            <div class="previews" id="previews"></div>

            <div class="progress-wrap" id="progressWrap">
                <div class="progress-text"><span>Uploading photos...</span><span id="progressPercent">0%</span></div>
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            </div>

            <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap;">
                <button class="btn btn-primary" id="uploadBtn" onclick="uploadAll()" disabled>
                    <i class="fas fa-cloud-upload-alt"></i> Upload All Photos
                </button>
                <button class="btn btn-outline" onclick="clearAll()">
                    <i class="fas fa-trash"></i> Clear All
                </button>
            </div>
        </div>

        <!-- GALLERY CARD -->
        <div class="card">
            <h2 style="font-size:1.1rem;margin-bottom:16px;display:flex;align-items:center;gap:8px;">
                <i class="fas fa-photo-video" style="color:var(--gold);"></i> All Gallery Photos 
                <span style="font-size:0.7rem;color:var(--gray-500);font-weight:400;">(Click to view full size)</span>
            </h2>
            <div class="gallery-grid" id="galleryGrid">
                <div style="text-align:center;padding:30px;color:var(--gray-500);grid-column:1/-1;">Loading photos...</div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCOKKBSbZJk8QSGvj1CPYQb_kjQb1tXO6s",
            authDomain: "starlet-registor.firebaseapp.com",
            databaseURL: "https://starlet-registor-default-rtdb.firebaseio.com",
            projectId: "starlet-registor",
            storageBucket: "starlet-registor.firebasestorage.app",
            messagingSenderId: "904193225045",
            appId: "1:904193225045:web:0c9ed3f3d7251862ff7fdc"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const DB_PATH = 'thp-gallery';
        const IMGBB_KEY = "53fb01955a45c5462724b8f7d238500a";

        let selectedFiles = [];

        function showAlert(msg, type = 'success') {
            const box = document.getElementById('alertBox');
            const icons = { success: 'check-circle', error: 'exclamation-circle' };
            box.innerHTML = `<div class="alert alert-${type}"><i class="fas fa-${icons[type]}"></i> ${msg}</div>`;
            setTimeout(() => box.innerHTML = '', 4000);
        }

        // Drag & Drop
        const uploadZone = document.getElementById('uploadZone');
        uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
        uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            handleFiles({ files: e.dataTransfer.files });
        });

        function handleFiles(input) {
            const files = Array.from(input.files);
            if (files.length === 0) return;
            
            // Validate
            const validFiles = files.filter(f => {
                if (!f.type.startsWith('image/')) { showAlert(`"${f.name}" is not an image file`, 'error'); return false; }
                if (f.size > 32 * 1024 * 1024) { showAlert(`"${f.name}" is larger than 32MB`, 'error'); return false; }
                return true;
            });

            selectedFiles = [...selectedFiles, ...validFiles];
            renderPreviews();
            updateUploadButton();
        }

        function renderPreviews() {
            const container = document.getElementById('previews');
            container.innerHTML = selectedFiles.map((file, i) => {
                const url = URL.createObjectURL(file);
                return `
                    <div class="preview-item">
                        <img src="${url}" alt="Preview ${i+1}">
                        <button class="remove" onclick="removeFile(${i})">✕</button>
                        <span class="status pending">Pending</span>
                    </div>`;
            }).join('');
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            renderPreviews();
            updateUploadButton();
        }

        function clearAll() {
            selectedFiles = [];
            document.getElementById('fileInput').value = '';
            document.getElementById('previews').innerHTML = '';
            updateUploadButton();
        }

        function updateUploadButton() {
            document.getElementById('uploadBtn').disabled = selectedFiles.length === 0;
            document.getElementById('uploadBtn').innerHTML = `<i class="fas fa-cloud-upload-alt"></i> Upload ${selectedFiles.length} Photo${selectedFiles.length !== 1 ? 's' : ''}`;
        }

        async function uploadAll() {
            if (selectedFiles.length === 0) return;

            const btn = document.getElementById('uploadBtn');
            const origText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';

            const progressWrap = document.getElementById('progressWrap');
            const progressFill = document.getElementById('progressFill');
            const progressPercent = document.getElementById('progressPercent');
            progressWrap.classList.add('active');

            // Update status to uploading
            document.querySelectorAll('.preview-item .status').forEach(s => {
                s.textContent = 'Uploading...';
                s.className = 'status uploading';
            });

            let uploaded = 0;
            let failed = 0;

            for (let i = 0; i < selectedFiles.length; i++) {
                const file = selectedFiles[i];
                const formData = new FormData();
                formData.append('image', file);
                formData.append('key', IMGBB_KEY);

                try {
                    const response = await fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: formData });
                    const data = await response.json();

                    if (data.success) {
                        // Save to Firebase
                        await db.ref(DB_PATH).push({
                            url: data.data.url,
                            thumbnail: data.data.thumb?.url || data.data.url,
                            filename: file.name,
                            uploadedAt: firebase.database.ServerValue.TIMESTAMP,
                            size: file.size
                        });

                        uploaded++;
                        // Update preview status
                        const statusEl = document.querySelectorAll('.preview-item .status')[i];
                        if (statusEl) { statusEl.textContent = '✓ Done'; statusEl.className = 'status done'; }
                    } else {
                        failed++;
                        const statusEl = document.querySelectorAll('.preview-item .status')[i];
                        if (statusEl) { statusEl.textContent = 'Failed'; statusEl.className = 'status'; statusEl.style.background = '#fee2e2'; statusEl.style.color = '#991b1b'; }
                    }
                } catch (error) {
                    failed++;
                    const statusEl = document.querySelectorAll('.preview-item .status')[i];
                    if (statusEl) { statusEl.textContent = 'Failed'; statusEl.className = 'status'; statusEl.style.background = '#fee2e2'; statusEl.style.color = '#991b1b'; }
                }

                const progress = Math.round(((i + 1) / selectedFiles.length) * 100);
                progressFill.style.width = progress + '%';
                progressPercent.textContent = progress + '%';
            }

            progressWrap.classList.remove('active');
            btn.disabled = false;
            btn.innerHTML = origText;

            if (uploaded > 0) {
                showAlert(`✅ ${uploaded} photo${uploaded !== 1 ? 's' : ''} uploaded successfully!${failed > 0 ? ` (${failed} failed)` : ''}`);
                selectedFiles = [];
                document.getElementById('fileInput').value = '';
                document.getElementById('previews').innerHTML = '';
                updateUploadButton();
                loadGallery();
            } else {
                showAlert('❌ Upload failed. Please try again.', 'error');
            }
        }

        function loadGallery() {
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '<div style="text-align:center;padding:30px;color:var(--gray-500);grid-column:1/-1;">Loading...</div>';

            db.ref(DB_PATH).on('value', snap => {
                grid.innerHTML = '';
                let count = 0;
                if (snap.exists()) {
                    const items = [];
                    snap.forEach(child => {
                        items.push({ id: child.key, ...child.val() });
                    });
                    items.reverse(); // Newest first
                    count = items.length;

                    items.forEach(item => {
                        grid.innerHTML += `
                            <div class="gallery-item">
                                <img src="${item.thumbnail || item.url}" alt="Gallery" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22><rect fill=%22%23ddd%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%23999%22 font-size=%2212%22>Error</text></svg>'">
                                <div class="actions">
                                    <button class="btn btn-sm btn-outline" onclick="window.open('${item.url}', '_blank')" style="color:white;border-color:rgba(255,255,255,0.5);background:transparent;" title="View Full Size"><i class="fas fa-expand"></i></button>
                                    <button class="btn btn-sm btn-danger" onclick="deleteImage('${item.id}')" title="Delete"><i class="fas fa-trash"></i></button>
                                </div>
                            </div>`;
                    });
                }
                if (count === 0) {
                    grid.innerHTML = '<div style="text-align:center;padding:40px;color:var(--gray-500);grid-column:1/-1;"><i class="fas fa-image" style="font-size:3rem;opacity:0.2;display:block;margin-bottom:12px;"></i>No photos uploaded yet</div>';
                }
                document.getElementById('totalImages').textContent = count;
            });
        }

        window.deleteImage = function(id) {
            if (confirm('Delete this photo from gallery?')) {
                db.ref(`${DB_PATH}/${id}`).remove()
                    .then(() => showAlert('Photo deleted successfully!'))
                    .catch(e => showAlert('Error: ' + e.message, 'error'));
            }
        };

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            loadGallery();
        });
    </script>
</body>
</html>
