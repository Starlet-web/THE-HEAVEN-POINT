<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CBT · THP Coaching</title>
  <!-- Tailwind via CDN + base style -->
  <script src="https://cdn.tailwindcss.com">
  </script>
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- MathJax for formulas (lightweight) -->
  <script>
    MathJax = { tex: { inlineMath: [
        ['$', '$'],
        ['\\(', '\\)']
      ] } };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js">
  </script>
  <style>
    * {
      user-select: none;
      -webkit-user-select: none;
    }
    body {
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      background: #f4f7fc;
    }
    .cbt-card {
      transition: all 0.15s ease;
    }
    .palette-btn {
      width: 38px;
      height: 38px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 0.9rem;
      border: 1px solid #d1d5db;
      background: white;
      cursor: pointer;
      transition: 0.1s;
    }
    .palette-btn.active {
      background: #1e3a8a;
      color: white;
      border-color: #1e3a8a;
    }
    .palette-btn.answered {
      background: #16a34a;
      color: white;
      border-color: #16a34a;
    }
    .palette-btn.marked {
      background: #f59e0b;
      color: white;
      border-color: #f59e0b;
    }
    .palette-btn.not-visited {
      background: white;
      color: #1f2937;
    }
    .palette-btn.current {
      outline: 3px solid #2563eb;
      outline-offset: 2px;
    }
    .option-label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1.5px solid #e5e7eb;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.1s;
      background: white;
    }
    .option-label:hover {
      background: #f0f4ff;
      border-color: #93b4f0;
    }
    .option-label.selected {
      background: #dbeafe;
      border-color: #2563eb;
    }
    .option-label input[type="radio"] {
      width: 18px;
      height: 18px;
      accent-color: #2563eb;
    }
    .question-panel {
      background: white;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.05);
      padding: 20px 22px;
    }
    .timer-box {
      background: #0b1e3a;
      color: white;
      padding: 8px 18px;
      border-radius: 50px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .footer-brand {
      font-size: 0.8rem;
      color: #6b7280;
      text-align: center;
      padding: 20px 0 10px;
      border-top: 1px solid #e5e7eb;
      margin-top: 30px;
    }
    .dark .footer-brand {
      border-color: #374151;
      color: #9ca3af;
    }
    /* dark mode overrides */
    .dark body {
      background: #111827;
    }
    .dark .question-panel {
      background: #1f2937;
      color: #f1f5f9;
    }
    .dark .option-label {
      background: #2d3a4f;
      border-color: #4b5563;
      color: #e5e7eb;
    }
    .dark .option-label.selected {
      background: #1e3a8a;
      border-color: #3b82f6;
    }
    .dark .palette-btn {
      background: #2d3a4f;
      border-color: #4b5563;
      color: #e5e7eb;
    }
    .dark .palette-btn.answered {
      background: #16a34a;
    }
    .dark .palette-btn.marked {
      background: #d97706;
    }
    .dark .palette-btn.active {
      background: #2563eb;
    }
    .dark .palette-btn.not-visited {
      background: #2d3a4f;
      color: #d1d5db;
    }
    .dark .timer-box {
      background: #0b1e3a;
    }
    .loading-screen {
      position: fixed;
      inset: 0;
      background: #0b1e3a;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .loading-screen img {
      width: 80px;
      margin-bottom: 20px;
    }
    .btn-primary {
      background: #1e3a8a;
      color: white;
      padding: 10px 24px;
      border-radius: 40px;
      font-weight: 600;
      transition: 0.1s;
    }
    .btn-primary:hover {
      background: #1e40af;
    }
    .btn-outline {
      border: 1.5px solid #1e3a8a;
      color: #1e3a8a;
      background: transparent;
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 500;
    }
    .dark .btn-outline {
      border-color: #93b4f0;
      color: #93b4f0;
    }
  </style>
</head>
<body>

  <!-- LOADING SCREEN -->
  <div id="loadingScreen" class="loading-screen">
    <div class="text-3xl font-bold text-white">THP</div>
    <div class="text-lg text-blue-200 mt-1">Coaching</div>
    <div class="mt-6 w-48 h-1.5 bg-blue-800 rounded-full overflow-hidden">
      <div id="loadBar" class="h-full bg-blue-400 rounded-full" style="width:0%"></div>
    </div>
    <p class="text-sm text-blue-200 mt-4">Loading CBT ...</p>
  </div>

  <!-- MAIN APP (hidden until ready) -->
  <div id="cbtApp" class="hidden min-h-screen flex flex-col">

    <!-- TOP HEADER -->
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-30 border-b border-gray-200 dark:border-gray-700">
      <div class="max-w-7xl mx-auto px-3 sm:px-6 py-2 flex flex-wrap items-center justify-between gap-2">
        <div class="flex items-center gap-2">
          <span class="text-2xl font-bold text-blue-900 dark:text-blue-300">THP</span>
          <span class="text-sm font-medium text-gray-500 dark:text-gray-400 hidden sm:inline">CBT · EXAM</span>
        </div>
        <div class="flex items-center gap-3 flex-wrap">
          <div class="timer-box flex items-center gap-2 text-sm"><i class="far fa-clock"></i> <span id="timerDisplay">01:00:00</span></div>
          <button id="langToggle" class="text-sm bg-gray-100 dark:bg-gray-700 px-3 py-1 rounded-full border border-gray-300 dark:border-gray-600"><i class="fas fa-language mr-1"></i> <span id="langLabel">EN</span></button>
          <button id="themeToggle" class="text-lg text-gray-600 dark:text-gray-300"><i class="fas fa-moon dark:fa-sun"></i></button>
        </div>
      </div>
    </header>

    <!-- MAIN BODY -->
    <div class="flex-1 max-w-7xl mx-auto w-full px-3 sm:px-6 py-4 grid grid-cols-1 lg:grid-cols-4 gap-5">
      <!-- LEFT: QUESTION + CONTROLS -->
      <div class="lg:col-span-3 space-y-4">
        <!-- progress bar + counters -->
        <div class="flex flex-wrap items-center justify-between gap-2 bg-white dark:bg-gray-800 p-3 rounded-xl shadow-sm">
          <div class="flex gap-4 text-sm flex-wrap">
            <span><span class="font-bold text-green-600" id="answeredCount">0</span> Answered</span>
            <span><span class="font-bold text-yellow-600" id="markedCount">0</span> Marked</span>
            <span><span class="font-bold text-blue-600" id="notVisitedCount">0</span> Not Visited</span>
          </div>
          <div class="w-full sm:w-40 h-2.5 bg-gray-200 dark:bg-gray-700 rounded-full">
            <div id="progressBar" class="h-2.5 bg-blue-600 rounded-full" style="width:0%"></div>
          </div>
        </div>

        <!-- QUESTION PANEL -->
        <div id="questionPanel" class="question-panel">
          <div class="flex justify-between items-start mb-3">
            <span id="qNumber" class="text-sm font-semibold text-gray-500 dark:text-gray-400">Q1</span>
            <span id="qType" class="text-xs px-3 py-1 bg-blue-50 dark:bg-blue-900/30 rounded-full text-blue-700 dark:text-blue-300">MCQ</span>
          </div>
          <div id="questionText" class="text-base md:text-lg font-medium leading-relaxed">Loading question...</div>
          <!-- options container -->
          <div id="optionsContainer" class="mt-4 space-y-2"></div>
          <!-- explanation (visible after submit) -->
          <div id="explanationBox" class="mt-4 p-3 bg-blue-50 dark:bg-blue-900/20 rounded-xl border border-blue-100 dark:border-blue-800 hidden">
            <span class="font-semibold text-sm">Explanation:</span>
            <span id="explanationText" class="text-sm"></span>
          </div>
          <!-- action buttons -->
          <div class="mt-5 flex flex-wrap gap-2 justify-between items-center">
            <div class="flex flex-wrap gap-2">
              <button id="prevBtn" class="btn-outline text-sm px-4 py-1.5"><i class="fas fa-chevron-left mr-1"></i> Prev</button>
              <button id="nextBtn" class="btn-outline text-sm px-4 py-1.5">Next <i class="fas fa-chevron-right ml-1"></i></button>
            </div>
            <div class="flex flex-wrap gap-2">
              <button id="saveNextBtn" class="btn-primary text-sm px-4 py-1.5"><i class="fas fa-save mr-1"></i> Save & Next</button>
              <button id="markBtn" class="bg-yellow-500 hover:bg-yellow-600 text-white text-sm px-4 py-1.5 rounded-full"><i class="fas fa-flag mr-1"></i> Mark</button>
              <button id="clearBtn" class="bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-sm px-4 py-1.5 rounded-full">Clear</button>
            </div>
          </div>
        </div>
      </div>

      <!-- RIGHT: PALETTE + INSTRUCTIONS -->
      <div class="lg:col-span-1 space-y-4">
        <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm">
          <div class="flex justify-between items-center mb-2">
            <span class="font-semibold text-sm">Question Palette</span>
            <span id="totalQuestionsDisplay" class="text-xs bg-gray-100 dark:bg-gray-700 px-2 py-0.5 rounded-full">0</span>
          </div>
          <div id="paletteGrid" class="grid grid-cols-5 gap-1.5 mt-1"></div>
          <div class="flex flex-wrap gap-3 text-xs mt-3 text-gray-600 dark:text-gray-400">
            <span><span class="inline-block w-3 h-3 bg-green-500 rounded-sm mr-1"></span>Answered</span>
            <span><span class="inline-block w-3 h-3 bg-yellow-500 rounded-sm mr-1"></span>Marked</span>
            <span><span class="inline-block w-3 h-3 bg-blue-600 rounded-sm mr-1"></span>Current</span>
            <span><span class="inline-block w-3 h-3 bg-white border border-gray-300 rounded-sm mr-1"></span>Not Visited</span>
          </div>
          <button id="submitExamBtn" class="mt-4 w-full bg-red-600 hover:bg-red-700 text-white py-2 rounded-full text-sm font-semibold"><i class="fas fa-check-circle mr-1"></i> Submit Exam</button>
        </div>
        <!-- instructions mini -->
        <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm text-xs text-gray-600 dark:text-gray-300 border-l-4 border-blue-500">
          <p><i class="fas fa-info-circle mr-1 text-blue-500"></i> Right-click disabled · Auto-submit at 1h</p>
          <p class="mt-1"><i class="fas fa-sync-alt mr-1 text-blue-500"></i> Progress saved locally</p>
        </div>
      </div>
    </div>

    <!-- FOOTER -->
    <div class="footer-brand">Powered by <span class="font-semibold text-blue-700 dark:text-blue-400">THP Coaching</span> · CBT v2.0</div>
  </div>

  <!-- RESULT MODAL (hidden) -->
  <div id="resultModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-white dark:bg-gray-800 max-w-4xl w-full max-h-[90vh] overflow-y-auto rounded-3xl p-6 shadow-2xl">
      <div class="flex justify-between items-center border-b pb-3 mb-4">
        <h2 class="text-2xl font-bold text-blue-800 dark:text-blue-300"><i class="fas fa-clipboard-check mr-2"></i> Result</h2>
        <button id="closeResult" class="text-gray-500 hover:text-gray-700 text-xl">&times;</button>
      </div>
      <div id="resultContent" class="space-y-4"></div>
      <div class="flex flex-wrap gap-3 mt-6">
        <button id="exportPDF" class="bg-red-600 hover:bg-red-700 text-white px-5 py-2 rounded-full text-sm"><i class="fas fa-file-pdf mr-1"></i> PDF</button>
        <button id="exportExcel" class="bg-green-600 hover:bg-green-700 text-white px-5 py-2 rounded-full text-sm"><i class="fas fa-file-excel mr-1"></i> Excel</button>
        <button id="exportCSV" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-full text-sm"><i class="fas fa-file-csv mr-1"></i> CSV</button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // ========== CONFIG ==========
      const EXAM_CONFIG = {
        examTitle: "Coding Decoding · Day 3",
        totalQuestions: 20,
        timeMinutes: 60,
        negativeMarking: 0.25, // per wrong MCQ
        questions: [
          // 1
          { id: 1, type: 'MCQ', text: 'In a certain code language, "YEARLY" is written as "BVZIOB". What will be the code for "ANNUAL" in the same language?', options: ['ZFMOMM', 'ZNNFZA', 'ZMMFZO', 'ZXAMMO'], correct: 2,
          explanation: 'Reverse alphabet mapping: A=Z, N=M, N=M, U=F, A=Z, L=O → ZMMFZO' },
          // 2
          { id: 2, type: 'MCQ', text: 'In a certain code language, "TABU" is written as "SBAV" and "TANK" is written as "SBML". How will "TAIL" be written in that language?', options: ['SBJM', 'SBHM', 'SAJM', 'SAHM'], correct: 0,
            explanation: 'Pattern: first letter -1, second +0, third +1, fourth +1 → TAIL → SBJM' },
          // 3
          { id: 3, type: 'MCQ', text: 'If "DELHI" is coded as "EDMGJ", how is "NEPAL" coded?', options: ['OFQZM', 'ODQZM', 'ODPZM', 'MDQZM'], correct: 1,
            explanation: '+1,-1,+1,-1,+1 pattern: NEPAL → ODQZM' },
          // 4
          { id: 4, type: 'MCQ', text: 'In a certain code, "COW" is written as "ZRF" and "DOG" is written as "JRG". How will "RAT" be written in that language?', options: ['WDU', 'UDW', 'VCT', 'WCU'], correct: 0,
            explanation: 'Letter shifting pattern: R→W, A→D, T→U → WDU' },
          // 5
          { id: 5, type: 'MCQ', text: 'If "INTELLIGENCE" is coded as "ETNIGILLECNE", then how can "MATHEMATICAL" be coded?', options: ['AMHTMETACILA', 'TAMMEHTALAC', 'HTAMTAMELACI', 'LACITAMEHTAM'],
            correct: 3, explanation: 'Reverse order of pairs: MATHEMATICAL → LACITAMEHTAM' },
          // 6
          { id: 6, type: 'MCQ', text: 'If "EASY" is written as "5117" in a certain code language, how will "BEAM" be written?', options: ['4512', '2514', '2513', '2563'], correct: 2,
            explanation: 'E=5, A=1, S=19→? Actually pattern: E=5, A=1, S=19→? Wait: BEAM → B=2, E=5, A=1, M=13 → 2513' },
          // 7
          { id: 7, type: 'MCQ', text: 'In a certain code language, "ISSUE" is written as "341145". What will be the code for "DATES"?', options: ['4567', '7600', '4120519', '604'], correct: 2,
            explanation: 'ISSUE → 341145, DATES → 4120519' },
          // 8
          { id: 8, type: 'MCQ', text: 'If "SPECIAL" is written as "65", what will "CONNECT" be coded as?', options: ['70', '64', '74', '78'], correct: 2,
            explanation: 'Sum of positions: SPECIAL = 19+16+5+3+9+1+12 = 65; CONNECT = 3+15+14+14+5+3+20 = 74' },
          // 9
          { id: 9, type: 'MCQ', text: 'If "MOST" is written as "134" and "FUR" is written as "90", then how will "SUCCESS" be written?', options: ['178', '176', '180', '190'], correct: 0,
            explanation: 'MOST: (13+15+19+20) × 2 = 134; FUR: (6+21+18) × 2 = 90; SUCCESS: (19+21+3+3+5+19+19) × 2 = 178' },
          // 10
          { id: 10, type: 'MCQ', text: 'In a certain code, "D" is coded as "16", "B" is coded as "4" and "T" is coded as "400". How will "H" be coded in the same language?', options: ['8', '64', '25', '36'], correct: 1,
            explanation: 'D=4 → 4²=16; B=2 → 4; T=20 → 400; H=8 → 64' },
          // 11 - CORRECTED: Changed from A)345 to B)360
          { id: 11, type: 'MCQ', text: 'If "SEND" is coded as "168" and "PURSE" is coded as "395", how is "MONEY" coded?', options: ['345', '360', '380', '350'], correct: 1,
            explanation: 'SEND: (19+5+14+4) × 4 = 168; PURSE: (16+21+18+19+5) × 5 = 395; MONEY: (13+15+14+5+25) × 5 = 360' },
          // 12
          { id: 12, type: 'MCQ', text: 'In a certain code, "WORK" is written as "4-12-9-16". How will you code "WOMAN"?', options: ['4-12-14-26-13', '4-26-14-13-12', '23-15-13-1-14', '4-12-26-13-14'],
            correct: 0, explanation: 'Reverse alphabet mapping: W→4, O→12, M→14, A→26, N→13 → 4-12-14-26-13' },
          // 13
          { id: 13, type: 'MCQ', text: 'In a certain code language, "APPLE" is coded as 50. How will "MANGO" be coded?', options: ['50', '48', '60', '55'], correct: 0,
            explanation: 'APPLE: 1+16+16+12+5 = 50; MANGO: 13+1+14+7+15 = 50' },
          // 14
          { id: 14, type: 'MCQ', text: 'If "SIGN" is coded as "8367" and "DIRECT" is coded as "134259", then how will "SIREN" be coded?', options: ['83427', '84327', '83247', '83472'], correct: 0,
            explanation: 'Mapping: S=8, I=3, G=6, N=7; D=1, I=3, R=4, E=2, C=5, T=9; SIREN = 8,3,4,2,7 → 83427' },
          // 15
          { id: 15, type: 'MCQ', text: 'If "BROTHER" is coded as 86, "FATHER" is coded as 58 and "SISTER" is coded as 90, then how will "MOTHER" be coded?', options: ['73', '79', '83', '89'], correct: 1,
            explanation: 'BROTHER: 2+18+15+20+8+5+18 = 86; FATHER: 58; SISTER: 90; MOTHER: 13+15+20+8+5+18 = 79' },
          // 16
          { id: 16, type: 'MCQ', text: 'If "white" is called "blue", "blue" is called "red", "red" is called "yellow", "yellow" is called "green", "green" is called "black", "black" is called "violet", and "violet" is called "orange", what would be the color of human blood?',
            options: ['Red', 'Green', 'Yellow', 'Violet'], correct: 2, explanation: 'Blood is red, red is called yellow → Yellow' },
          // 17
          { id: 17, type: 'MCQ', text: 'If "parrot" is known as "peacock", "peacock" is known as "swallow", "swallow" is known as "pigeon", and "pigeon" is known as "sparrow", what is the national bird of India?',
            options: ['Parrot', 'Swallow', 'Pigeon', 'Peacock'], correct: 1, explanation: 'National bird is peacock, peacock is known as swallow → Swallow' },
          // 18
          { id: 18, type: 'MCQ', text: 'In a certain code, \'it is raining\' is coded as \'dy po ko\', \'is raining now\' is coded as \'po jo ko\', and \'is now it\' is coded as \'po jo dy\'. What is the code for \'raining\'?',
            options: ['ko', 'po', 'jo', 'dy'], correct: 0, explanation: 'From first and second, raining = ko' },
          // 19
          { id: 19, type: 'MCQ', text: 'Read the statements: \'Move Fast Or Left Behind\' → \'7 1 9 0 3\'; \'Move Left Behind The Journey\' → \'4 9 1 5 3\'; \'The Life Ended Or Behind\' → \'0 8 4 9 2\'. What is the code for \'Behind\'?',
            options: ['9', '3', '1', '0'], correct: 1, explanation: 'Behind appears in 1st & 2nd statements: code 3 (common at last position)' },
          // 20
          { id: 20, type: 'MCQ', text: 'Read: \'good song classic\' → \'si ma bu\'; \'song recall memory\' → \'bu ly ph\'; \'memory good nostalgia\' → \'ph ma zo\'. What is the code for \'song\'?',
            options: ['si', 'ma', 'bu', 'ph'], correct: 2, explanation: 'song appears in first two statements: common code bu' }
        ]
      };

      // ========== GLOBALS ==========
      let questions = [];
      let currentQ = 0;
      let answers = {}; // { qIndex: selectedOptionIndex (number) }
      let marked = {}; // { qIndex: true }
      let visited = {}; // { qIndex: true }
      let examStarted = false;
      let timerInterval = null;
      let timeRemaining = EXAM_CONFIG.timeMinutes * 60; // seconds
      let isSubmitted = false;
      let lang = 'en'; // 'en' or 'hi'
      let darkMode = false;
      let randomizedIndices = []; // order of questions

      // UI elements
      const $ = id => document.getElementById(id);
      const qPanel = $('questionPanel');
      const qNumber = $('qNumber');
      const qType = $('qType');
      const questionText = $('questionText');
      const optionsContainer = $('optionsContainer');
      const explanationBox = $('explanationBox');
      const explanationText = $('explanationText');
      const paletteGrid = $('paletteGrid');
      const answeredCount = $('answeredCount');
      const markedCount = $('markedCount');
      const notVisitedCount = $('notVisitedCount');
      const progressBar = $('progressBar');
      const totalQuestionsDisplay = $('totalQuestionsDisplay');
      const timerDisplay = $('timerDisplay');
      const submitBtn = $('submitExamBtn');
      const resultModal = $('resultModal');
      const resultContent = $('resultContent');
      const loadingScreen = $('loadingScreen');

      // ========== UTILITY ==========
      function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      // Load from localStorage
      function loadState() {
        try {
          const saved = localStorage.getItem('cbt_state');
          if (saved) {
            const state = JSON.parse(saved);
            if (state.questions && state.questions.length === EXAM_CONFIG.questions.length) {
              questions = state.questions;
              currentQ = state.currentQ || 0;
              answers = state.answers || {};
              marked = state.marked || {};
              visited = state.visited || {};
              timeRemaining = state.timeRemaining || EXAM_CONFIG.timeMinutes * 60;
              randomizedIndices = state.randomizedIndices || Array.from({ length: questions.length }, (_, i) => i);
              return true;
            }
          }
        } catch (e) {}
        return false;
      }

      function saveState() {
        try {
          localStorage.setItem('cbt_state', JSON.stringify({
            questions,
            currentQ,
            answers,
            marked,
            visited,
            timeRemaining,
            randomizedIndices
          }));
        } catch (e) {}
      }

      function initQuestions() {
        // shuffle options per question and store shuffled
        if (!loadState()) {
          // fresh: randomize both questions and options
          const qs = EXAM_CONFIG.questions.map(q => {
            const optCopy = [...q.options];
            // shuffle options but keep correct index updated
            const shuffled = shuffleArray([...optCopy]);
            const correctIdx = shuffled.indexOf(q.options[q.correct]);
            return {
              ...q,
              options: shuffled,
              correct: correctIdx,
              _origCorrect: q.correct
            };
          });
          // shuffle question order
          const idxs = Array.from({ length: qs.length }, (_, i) => i);
          shuffleArray(idxs);
          randomizedIndices = idxs;
          questions = idxs.map(i => qs[i]);
          // reset state
          answers = {};
          marked = {};
          visited = {};
          currentQ = 0;
          timeRemaining = EXAM_CONFIG.timeMinutes * 60;
          localStorage.removeItem('cbt_state');
        } else {
          // already loaded from state
        }
        totalQuestionsDisplay.textContent = questions.length;
        renderPalette();
        renderQuestion();
        updateCounters();
        startTimer();
      }

      // ========== RENDER ==========
      function renderQuestion() {
        if (isSubmitted || !questions.length) return;
        const q = questions[currentQ];
        if (!q) return;
        qNumber.textContent = `Q${currentQ + 1}`;
        qType.textContent = q.type;
        questionText.textContent = q.text;
        // options
        optionsContainer.innerHTML = '';
        q.options.forEach((opt, idx) => {
          const label = document.createElement('label');
          label.className = `option-label ${answers[currentQ] === idx ? 'selected' : ''}`;
          const radio = document.createElement('input');
          radio.type = 'radio';
          radio.name = 'qOption';
          radio.value = idx;
          if (answers[currentQ] === idx) radio.checked = true;
          radio.addEventListener('change', (e) => {
            if (e.target.checked) {
              answers[currentQ] = idx;
              visited[currentQ] = true;
              renderPalette();
              updateCounters();
              saveState();
              renderQuestion(); // refresh selected style
            }
          });
          const span = document.createElement('span');
          span.textContent = String.fromCharCode(65 + idx) + '. ' + opt;
          label.appendChild(radio);
          label.appendChild(span);
          optionsContainer.appendChild(label);
        });
        // mark visited
        visited[currentQ] = true;
        // explanation
        if (isSubmitted) {
          explanationBox.classList.remove('hidden');
          explanationText.textContent = q.explanation || 'No explanation';
        } else {
          explanationBox.classList.add('hidden');
        }
        // update palette highlight
        renderPalette();
        updateCounters();
        saveState();
      }

      function renderPalette() {
        if (!questions.length) return;
        paletteGrid.innerHTML = '';
        questions.forEach((q, idx) => {
          const btn = document.createElement('div');
          btn.className = 'palette-btn';
          if (idx === currentQ) btn.classList.add('current');
          if (answers[idx] !== undefined && answers[idx] !== null) btn.classList.add('answered');
          else if (marked[idx]) btn.classList.add('marked');
          else if (!visited[idx]) btn.classList.add('not-visited');
          btn.textContent = idx + 1;
          btn.addEventListener('click', () => {
            if (!isSubmitted) {
              currentQ = idx;
              renderQuestion();
              renderPalette();
            }
          });
          paletteGrid.appendChild(btn);
        });
      }

      function updateCounters() {
        const total = questions.length;
        const ans = Object.keys(answers).filter(k => answers[k] !== undefined && answers[k] !== null).length;
        const mark = Object.keys(marked).length;
        const notVis = total - Object.keys(visited).length;
        answeredCount.textContent = ans;
        markedCount.textContent = mark;
        notVisitedCount.textContent = notVis;
        progressBar.style.width = (ans / total * 100) + '%';
      }

      // ========== TIMER ==========
      function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
          if (isSubmitted) return;
          timeRemaining--;
          if (timeRemaining <= 0) {
            clearInterval(timerInterval);
            timeRemaining = 0;
            updateTimerDisplay();
            submitExam();
            return;
          }
          updateTimerDisplay();
          saveState();
        }, 1000);
        updateTimerDisplay();
      }

      function updateTimerDisplay() {
        const h = Math.floor(timeRemaining / 3600);
        const m = Math.floor((timeRemaining % 3600) / 60);
        const s = timeRemaining % 60;
        timerDisplay.textContent = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        if (timeRemaining < 60) timerDisplay.style.color = '#f87171';
      }

      // ========== SUBMIT ==========
      function submitExam() {
        if (isSubmitted) return;
        isSubmitted = true;
        clearInterval(timerInterval);
        // show result
        showResult();
      }

      function showResult() {
        let correct = 0,
          wrong = 0,
          unattempted = 0;
        const details = [];
        questions.forEach((q, idx) => {
          const userAns = answers[idx];
          const isCorrect = (userAns !== undefined && userAns !== null && userAns === q.correct);
          if (userAns === undefined || userAns === null) unattempted++;
          else if (isCorrect) correct++;
          else wrong++;
          details.push({
            qNum: idx + 1,
            text: q.text,
            userAns: userAns !== undefined && userAns !== null ? q.options[userAns] : 'Not Attempted',
            correctAns: q.options[q.correct],
            isCorrect,
            explanation: q.explanation || ''
          });
        });
        const total = questions.length;
        const score = correct - (wrong * EXAM_CONFIG.negativeMarking);
        const percentage = (correct / total * 100).toFixed(1);
        let html = `<div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-6">
          <div class="bg-green-50 dark:bg-green-900/30 p-4 rounded-xl text-center"><span class="text-2xl font-bold text-green-700 dark:text-green-300">${correct}</span><br><span class="text-xs">Correct</span></div>
          <div class="bg-red-50 dark:bg-red-900/30 p-4 rounded-xl text-center"><span class="text-2xl font-bold text-red-700 dark:text-red-300">${wrong}</span><br><span class="text-xs">Wrong</span></div>
          <div class="bg-gray-50 dark:bg-gray-700 p-4 rounded-xl text-center"><span class="text-2xl font-bold text-gray-700 dark:text-gray-300">${unattempted}</span><br><span class="text-xs">Unattempted</span></div>
          <div class="bg-blue-50 dark:bg-blue-900/30 p-4 rounded-xl text-center"><span class="text-2xl font-bold text-blue-700 dark:text-blue-300">${score.toFixed(2)}</span><br><span class="text-xs">Score</span></div>
        </div>
        <div class="space-y-2 max-h-60 overflow-y-auto">`;
        details.forEach(d => {
          html += `<div class="border-b border-gray-200 dark:border-gray-700 py-2 text-sm flex flex-wrap gap-2">
            <span class="font-semibold w-12">Q${d.qNum}</span>
            <span class="flex-1">${d.text.substring(0, 60)}${d.text.length > 60 ? '...' : ''}</span>
            <span class="text-xs ${d.isCorrect ? 'text-green-600' : 'text-red-500'}">${d.isCorrect ? '✔' : '✘'} (${d.userAns})</span>
            <span class="text-xs text-gray-500">Correct: ${d.correctAns}</span>
            <span class="text-xs text-blue-500">${d.explanation || ''}</span>
          </div>`;
        });
        html += `</div>`;
        resultContent.innerHTML = html;
        resultModal.classList.remove('hidden');
      }

      // ========== EVENT BINDINGS ==========
      function bindEvents() {
        $('prevBtn').addEventListener('click', () => {
          if (!isSubmitted && currentQ > 0) { currentQ--;
            renderQuestion();
            renderPalette(); }
        });
        $('nextBtn').addEventListener('click', () => {
          if (!isSubmitted && currentQ < questions.length - 1) { currentQ++;
            renderQuestion();
            renderPalette(); }
        });
        $('saveNextBtn').addEventListener('click', () => {
          if (isSubmitted) return;
          if (currentQ < questions.length - 1) { currentQ++;
            renderQuestion();
            renderPalette(); }
          saveState();
        });
        $('markBtn').addEventListener('click', () => {
          if (isSubmitted) return;
          marked[currentQ] = !marked[currentQ];
          renderPalette();
          updateCounters();
          saveState();
        });
        $('clearBtn').addEventListener('click', () => {
          if (isSubmitted) return;
          delete answers[currentQ];
          renderQuestion();
          renderPalette();
          updateCounters();
          saveState();
        });
        $('submitExamBtn').addEventListener('click', submitExam);
        $('closeResult').addEventListener('click', () => { resultModal.classList.add('hidden'); });
        // theme toggle
        $('themeToggle').addEventListener('click', () => {
          darkMode = !darkMode;
          document.documentElement.classList.toggle('dark', darkMode);
          localStorage.setItem('cbt_theme', darkMode ? 'dark' : 'light');
        });
        // lang toggle (simple mock)
        $('langToggle').addEventListener('click', () => {
          lang = lang === 'en' ? 'hi' : 'en';
          $('langLabel').textContent = lang.toUpperCase();
          document.querySelectorAll('.option-label span:last-child').forEach((el, idx) => {
            // keep as is, for demo
          });
        });
        // export buttons (stub)
        $('exportPDF').addEventListener('click', () => alert('PDF export placeholder'));
        $('exportExcel').addEventListener('click', () => alert('Excel export placeholder'));
        $('exportCSV').addEventListener('click', () => alert('CSV export placeholder'));
        // disable right click
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('copy', e => e.preventDefault());
        document.addEventListener('cut', e => e.preventDefault());
        document.addEventListener('paste', e => e.preventDefault());
        // tab switch warning
        document.addEventListener('visibilitychange', () => {
          if (document.hidden && !isSubmitted) {
            alert('Tab switch detected. Please stay on exam page.');
          }
        });
      }

      // ========== INIT ==========
      function init() {
        // loading bar
        let progress = 0;
        const loadInterval = setInterval(() => {
          progress += 10;
          if (progress >= 100) { clearInterval(loadInterval); }
          $('loadBar').style.width = progress + '%';
        }, 80);
        setTimeout(() => {
          loadingScreen.style.display = 'none';
          document.getElementById('cbtApp').classList.remove('hidden');
          // dark mode from localStorage
          if (localStorage.getItem('cbt_theme') === 'dark') {
            darkMode = true;
            document.documentElement.classList.add('dark');
          }
          initQuestions();
          bindEvents();
          // disable text selection
          document.body.style.userSelect = 'none';
        }, 600);
      }

      window.onload = init;
    })();
  </script>
</body>
</html>
