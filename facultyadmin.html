<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>THP Admin Panel • Faculty & Gallery Manager</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="channels4_profile.jpg" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
  <style>
    :root {
      --navy: #1a2a4a; --blue: #1e5fbb; --gold: #b8860b; --white: #fff; --gray-50: #f8f9fa;
      --gray-100: #f1f3f5; --gray-200: #e9ecef; --gray-300: #dee2e3; --gray-500: #6c757d;
      --gray-700: #343a40; --green: #2b8a3e; --red: #c92a2a; --orange: #e67700;
      --shadow: 0 1px 3px rgba(0,0,0,0.07); --shadow-lg: 0 8px 25px rgba(0,0,0,0.12);
      --radius: 8px; --radius-lg: 14px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#f4f6fb; color:var(--gray-700); min-height:100vh; }
    .admin-header {
      background:var(--navy); color:white; padding:16px 24px; display:flex; align-items:center;
      justify-content:space-between; flex-wrap:wrap; gap:12px; border-bottom:3px solid var(--gold);
    }
    .admin-header h1 { font-size:1.3rem; font-weight:700; display:flex; align-items:center; gap:10px; }
    .admin-header h1 img { height:38px; border-radius:6px; }
    .logout-btn { background:rgba(255,255,255,0.1); color:white; border:1px solid rgba(255,255,255,0.25); padding:8px 18px; border-radius:20px; cursor:pointer; font-weight:600; font-size:0.8rem; transition:0.3s; }
    .logout-btn:hover { background:var(--red); border-color:var(--red); }
    .container { max-width:1300px; margin:0 auto; padding:24px 20px; }
    .tabs { display:flex; gap:8px; margin-bottom:28px; flex-wrap:wrap; }
    .tab-btn {
      padding:11px 26px; border-radius:30px; border:2px solid var(--gray-200); background:white;
      font-weight:700; font-size:0.85rem; cursor:pointer; transition:0.3s; color:var(--gray-700);
      display:flex; align-items:center; gap:7px;
    }
    .tab-btn.active { background:var(--blue); color:white; border-color:var(--blue); box-shadow:0 6px 18px rgba(30,95,187,0.3); }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }
    .card { background:white; border-radius:var(--radius-lg); padding:24px; box-shadow:var(--shadow); margin-bottom:22px; border:1px solid var(--gray-200); }
    .card h3 { font-size:1.1rem; font-weight:700; color:var(--navy); margin-bottom:18px; display:flex; align-items:center; gap:8px; }
    .form-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(240px,1fr)); gap:16px; }
    .form-group { display:flex; flex-direction:column; gap:5px; }
    .form-group label { font-weight:600; font-size:0.78rem; color:var(--navy); }
    .form-group input, .form-group textarea, .form-group select {
      padding:10px 14px; border:1.5px solid var(--gray-200); border-radius:var(--radius);
      font-family:inherit; font-size:0.82rem; transition:0.3s; background:var(--gray-50);
    }
    .form-group input:focus, .form-group textarea:focus { border-color:var(--blue); outline:none; box-shadow:0 0 0 3px rgba(30,95,187,0.08); }
    .btn {
      padding:11px 24px; border-radius:var(--radius); font-weight:700; font-size:0.82rem;
      cursor:pointer; border:2px solid transparent; transition:0.3s; display:inline-flex; align-items:center; gap:7px;
    }
    .btn-primary { background:var(--blue); color:white; } .btn-primary:hover { background:#174a9e; }
    .btn-gold { background:var(--gold); color:white; } .btn-gold:hover { background:#9a6b0a; }
    .btn-outline { background:transparent; color:var(--navy); border-color:var(--gray-300); }
    .btn-danger { background:var(--red); color:white; } .btn-danger:hover { background:#a12222; }
    .btn-sm { padding:7px 14px; font-size:0.72rem; }
    .upload-preview { width:100px; height:100px; border-radius:10px; object-fit:cover; border:2px dashed var(--gray-300); margin-top:6px; display:none; }
    .table-wrap { overflow-x:auto; border-radius:var(--radius); border:1px solid var(--gray-200); }
    table { width:100%; border-collapse:collapse; font-size:0.78rem; min-width:700px; }
    table th { background:var(--navy); color:white; padding:12px; text-align:left; font-weight:600; font-size:0.7rem; }
    table td { padding:10px 12px; border-bottom:1px solid var(--gray-200); }
    table tbody tr:hover { background:var(--gray-50); }
    .status-badge { padding:3px 10px; border-radius:12px; font-size:0.65rem; font-weight:700; }
    .status-published { background:#ebfbee; color:var(--green); }
    .toast {
      position:fixed; bottom:24px; right:24px; background:var(--navy); color:white; padding:14px 24px;
      border-radius:30px; font-weight:600; font-size:0.82rem; z-index:9999; box-shadow:var(--shadow-lg);
      animation:slideUp 0.4s ease; display:none;
    }
    @keyframes slideUp { from{transform:translateY(40px);opacity:0;} to{transform:translateY(0);opacity:1;} }
    .login-overlay {
      position:fixed; inset:0; background:rgba(26,42,74,0.96); z-index:10000;
      display:flex; align-items:center; justify-content:center; flex-direction:column;
    }
    .login-card {
      background:white; padding:36px 30px; border-radius:20px; text-align:center;
      box-shadow:0 30px 60px rgba(0,0,0,0.4); width:90%; max-width:380px;
    }
    .login-card h2 { color:var(--navy); margin-bottom:20px; }
    .login-card input { width:100%; padding:12px; border-radius:var(--radius); border:2px solid var(--gray-200); margin-bottom:14px; font-size:0.9rem; }
    @media (max-width:600px) {
      .admin-header h1 { font-size:1rem; }
      .tabs { gap:4px; } .tab-btn { padding:9px 16px; font-size:0.72rem; }
    }
  </style>
</head>
<body>
  <div class="login-overlay" id="loginOverlay">
    <div class="login-card">
      <h2><i class="fas fa-lock" style="color:var(--gold);"></i> Admin Login</h2>
      <input type="password" id="adminPassword" placeholder="Enter admin password">
      <button class="btn btn-primary" onclick="attemptLogin()" style="width:100%;justify-content:center;">Unlock Panel</button>
      <p style="font-size:0.7rem;color:var(--gray-500);margin-top:10px;">Default: <strong>admin123</strong></p>
    </div>
  </div>

  <div id="adminContent" style="display:none;">
    <header class="admin-header">
      <h1><img src="channels4_profile.jpg" alt="THP"> The Heaven Point • Admin Panel</h1>
      <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </header>
    <div class="container">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('faculty')"><i class="fas fa-chalkboard-teacher"></i> Faculty</button>
        <button class="tab-btn" onclick="switchTab('gallery')"><i class="fas fa-images"></i> Gallery</button>
      </div>

      <!-- FACULTY TAB -->
      <div class="tab-panel active" id="tab-faculty">
        <div class="card">
          <h3><i class="fas fa-plus-circle"></i> <span id="facultyFormTitle">Add New Faculty</span></h3>
          <div class="form-grid">
            <div class="form-group"><label>Full Name *</label><input type="text" id="fName" placeholder="Dr. Arjun Sharma"></div>
            <div class="form-group"><label>Designation *</label><input type="text" id="fDesignation" placeholder="Director & HOD Physics"></div>
            <div class="form-group"><label>Subject</label><input type="text" id="fSubject" placeholder="Physics, JEE Advanced"></div>
            <div class="form-group"><label>Experience</label><input type="text" id="fExperience" placeholder="15+ years"></div>
            <div class="form-group"><label>Students Trained</label><input type="text" id="fStudents" placeholder="5000+"></div>
            <div class="form-group"><label>Display Order</label><input type="number" id="fOrder" placeholder="1" value="1" min="1"></div>
            <div class="form-group"><label>Profile Photo</label><input type="file" id="fPhoto" accept="image/*" onchange="previewFacultyPhoto()"><img id="fPhotoPreview" class="upload-preview"></div>
          </div>
          <input type="hidden" id="fEditId">
          <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap;">
            <button class="btn btn-primary" onclick="saveFaculty()"><i class="fas fa-save"></i> Save Faculty</button>
            <button class="btn btn-outline" onclick="resetFacultyForm()"><i class="fas fa-times"></i> Clear Form</button>
          </div>
        </div>
        <div class="card">
          <h3><i class="fas fa-list"></i> Faculty List (<span id="facultyCount">0</span>)</h3>
          <div class="table-wrap">
            <table><thead><tr><th>Photo</th><th>Name</th><th>Designation</th><th>Subject</th><th>Order</th><th>Actions</th></tr></thead><tbody id="facultyTableBody"></tbody></table>
          </div>
        </div>
      </div>

      <!-- GALLERY TAB -->
      <div class="tab-panel" id="tab-gallery">
        <div class="card">
          <h3><i class="fas fa-cloud-upload-alt"></i> Upload Gallery Image</h3>
          <div class="form-grid">
            <div class="form-group"><label>Select Image *</label><input type="file" id="gPhoto" accept="image/*" onchange="previewGalleryPhoto()"><img id="gPhotoPreview" class="upload-preview"></div>
          </div>
          <div style="margin-top:14px;">
            <button class="btn btn-gold" onclick="uploadGallery()"><i class="fas fa-upload"></i> Upload to Gallery</button>
          </div>
        </div>
        <div class="card">
          <h3><i class="fas fa-images"></i> Gallery Images (<span id="galleryCount">0</span>)</h3>
          <div class="table-wrap">
            <table><thead><tr><th>Preview</th><th>URL</th><th>Actions</th></tr></thead><tbody id="galleryTableBody"></tbody></table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCOKKBSbZJk8QSGvj1CPYQb_kjQb1tXO6s", authDomain: "starlet-registor.firebaseapp.com",
      databaseURL: "https://starlet-registor-default-rtdb.firebaseio.com", projectId: "starlet-registor",
      storageBucket: "starlet-registor.firebasestorage.app", messagingSenderId: "904193225045",
      appId: "1:904193225045:web:0c9ed3f3d7251862ff7fdc"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();

    const ADMIN_PASSWORD = "admin123";
    let currentTab = 'faculty';

    // ─── AUTH ───
    function attemptLogin() {
      const pass = document.getElementById('adminPassword').value;
      if(pass === ADMIN_PASSWORD) {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('adminContent').style.display = 'block';
        loadFacultyList();
        loadGalleryList();
        showToast('✅ Welcome Admin!');
      } else {
        showToast('❌ Incorrect password');
      }
    }
    function logout() {
      document.getElementById('loginOverlay').style.display = 'flex';
      document.getElementById('adminContent').style.display = 'none';
      document.getElementById('adminPassword').value = '';
    }

    // ─── TOAST ───
    function showToast(msg) {
      const t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'block';
      setTimeout(()=> t.style.display = 'none', 2800);
    }

    // ─── TAB SWITCH ───
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelector(`.tab-btn:has(i.fa-${tab==='faculty'?'chalkboard-teacher':'images'})`).classList.add('active');
      document.getElementById(`tab-${tab}`).classList.add('active');
    }

    // ══════════ FACULTY ══════════
    function previewFacultyPhoto() {
      const file = document.getElementById('fPhoto').files[0];
      const preview = document.getElementById('fPhotoPreview');
      if(file) { preview.src = URL.createObjectURL(file); preview.style.display = 'block'; }
    }
    function resetFacultyForm() {
      document.getElementById('fName').value = '';
      document.getElementById('fDesignation').value = '';
      document.getElementById('fSubject').value = '';
      document.getElementById('fExperience').value = '';
      document.getElementById('fStudents').value = '';
      document.getElementById('fOrder').value = '1';
      document.getElementById('fPhoto').value = '';
      document.getElementById('fPhotoPreview').style.display = 'none';
      document.getElementById('fEditId').value = '';
      document.getElementById('facultyFormTitle').textContent = 'Add New Faculty';
    }

    async function saveFaculty() {
      const name = document.getElementById('fName').value.trim();
      const designation = document.getElementById('fDesignation').value.trim();
      if(!name || !designation) { showToast('⚠️ Name and Designation required'); return; }
      const editId = document.getElementById('fEditId').value;
      const file = document.getElementById('fPhoto').files[0];
      const facultyData = {
        name, designation,
        subject: document.getElementById('fSubject').value.trim(),
        experience: document.getElementById('fExperience').value.trim(),
        students: document.getElementById('fStudents').value.trim(),
        order: parseInt(document.getElementById('fOrder').value) || 1
      };

      try {
        if(file) {
          const ext = file.name.split('.').pop();
          const path = `thp-faculty/${Date.now()}_${Math.random().toString(36).substr(2,6)}.${ext}`;
          const snap = await storage.ref(path).put(file);
          facultyData.image = await snap.ref.getDownloadURL();
          facultyData.images = [facultyData.image];
        }
        if(editId) {
          const existingSnap = await db.ref(`thp-faculty/${editId}`).once('value');
          const existing = existingSnap.val() || {};
          if(!file && existing.image) facultyData.image = existing.image;
          if(!file && existing.images) facultyData.images = existing.images;
          await db.ref(`thp-faculty/${editId}`).update(facultyData);
          showToast('✅ Faculty updated!');
        } else {
          await db.ref('thp-faculty').push(facultyData);
          showToast('✅ Faculty added!');
        }
        resetFacultyForm();
        loadFacultyList();
      } catch(e) { showToast('❌ Error: '+e.message); }
    }

    function loadFacultyList() {
      db.ref('thp-faculty').on('value', snap => {
        const tbody = document.getElementById('facultyTableBody');
        const countSpan = document.getElementById('facultyCount');
        tbody.innerHTML = ''; let count = 0;
        if(snap.exists()) {
          const list = []; snap.forEach(c => { list.push(Object.assign({id:c.key}, c.val())); });
          list.sort((a,b)=>(a.order||0)-(b.order||0));
          count = list.length;
          list.forEach(f => {
            const img = f.image || (f.images&&f.images.length?f.images[0]:'https://ui-avatars.com/api/?name=NA&size=80&background=ccc&color=fff');
            tbody.innerHTML += `<tr>
              <td><img src="${img}" style="width:40px;height:40px;border-radius:6px;object-fit:cover;" onerror="this.style.display='none'"></td>
              <td><strong>${f.name}</strong></td><td>${f.designation||''}</td><td>${f.subject||''}</td><td>${f.order||''}</td>
              <td>
                <button class="btn btn-outline btn-sm" onclick='editFaculty(${JSON.stringify(f).replace(/'/g,"&#39;")})'><i class="fas fa-edit"></i></button>
                <button class="btn btn-danger btn-sm" onclick="deleteFaculty('${f.id}')"><i class="fas fa-trash"></i></button>
              </td></tr>`;
          });
        } else { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--gray-500);">No faculty added yet.</td></tr>'; }
        countSpan.textContent = count;
      });
    }

    function editFaculty(f) {
      document.getElementById('fName').value = f.name || '';
      document.getElementById('fDesignation').value = f.designation || '';
      document.getElementById('fSubject').value = f.subject || '';
      document.getElementById('fExperience').value = f.experience || '';
      document.getElementById('fStudents').value = f.students || '';
      document.getElementById('fOrder').value = f.order || 1;
      document.getElementById('fEditId').value = f.id;
      document.getElementById('facultyFormTitle').textContent = 'Edit Faculty';
      const preview = document.getElementById('fPhotoPreview');
      const imgSrc = f.image || (f.images&&f.images.length?f.images[0]:'');
      if(imgSrc) { preview.src = imgSrc; preview.style.display = 'block'; }
      else { preview.style.display = 'none'; }
      document.getElementById('tab-faculty').scrollIntoView({behavior:'smooth'});
    }

    async function deleteFaculty(id) {
      if(!confirm('Delete this faculty member?')) return;
      await db.ref(`thp-faculty/${id}`).remove();
      showToast('🗑️ Faculty deleted');
      loadFacultyList();
    }

    // ══════════ GALLERY ══════════
    function previewGalleryPhoto() {
      const file = document.getElementById('gPhoto').files[0];
      const preview = document.getElementById('gPhotoPreview');
      if(file) { preview.src = URL.createObjectURL(file); preview.style.display = 'block'; }
    }
    async function uploadGallery() {
      const file = document.getElementById('gPhoto').files[0];
      if(!file) { showToast('⚠️ Please select an image'); return; }
      try {
        const ext = file.name.split('.').pop();
        const path = `thp-gallery/${Date.now()}_${Math.random().toString(36).substr(2,6)}.${ext}`;
        const snap = await storage.ref(path).put(file);
        const url = await snap.ref.getDownloadURL();
        await db.ref('thp-gallery').push({ url, uploadedAt: Date.now() });
        showToast('🖼️ Image uploaded!');
        document.getElementById('gPhoto').value = '';
        document.getElementById('gPhotoPreview').style.display = 'none';
        loadGalleryList();
      } catch(e) { showToast('❌ Upload failed: '+e.message); }
    }
    function loadGalleryList() {
      db.ref('thp-gallery').on('value', snap => {
        const tbody = document.getElementById('galleryTableBody');
        const countSpan = document.getElementById('galleryCount');
        tbody.innerHTML = ''; let count = 0;
        if(snap.exists()) {
          const list = []; snap.forEach(c => { list.push(Object.assign({id:c.key}, c.val())); });
          count = list.length;
          list.forEach(g => {
            tbody.innerHTML += `<tr>
              <td><img src="${g.url}" style="width:60px;height:45px;border-radius:6px;object-fit:cover;" onerror="this.style.display='none'"></td>
              <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${g.url}</td>
              <td><button class="btn btn-danger btn-sm" onclick="deleteGallery('${g.id}')"><i class="fas fa-trash"></i></button></td></tr>`;
          });
        } else { tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:var(--gray-500);">No gallery images.</td></tr>'; }
        countSpan.textContent = count;
      });
    }
    async function deleteGallery(id) {
      if(!confirm('Delete this gallery image?')) return;
      await db.ref(`thp-gallery/${id}`).remove();
      showToast('🗑️ Image deleted');
      loadGalleryList();
    }

    // ─── INIT ───
    document.addEventListener('DOMContentLoaded', ()=> {
      document.getElementById('adminPassword').addEventListener('keypress', e => { if(e.key==='Enter') attemptLogin(); });
    });
  </script>
</body>
</html>
