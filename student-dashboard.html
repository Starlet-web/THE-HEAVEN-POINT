<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - THP</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Poppins',sans-serif;background:#f0f4ff;padding:20px;min-height:100vh}
        .main{max-width:1200px;margin:0 auto}
        
        .topbar{background:white;border-radius:20px;padding:15px 22px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;box-shadow:0 10px 30px rgba(0,0,0,0.06)}
        .logo{display:flex;align-items:center;gap:8px;font-size:20px;font-weight:700;color:#6366f1}
        .logo span{font-size:28px}
        .btn{padding:8px 16px;border-radius:10px;font-weight:600;font-size:12px;cursor:pointer;border:none;font-family:inherit}
        .btn-out{background:white;color:#6366f1;border:2px solid #a5b4fc}.btn-out:hover{background:#6366f1;color:white}
        .btn-red{background:#ef4444;color:white}
        
        .card{background:white;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 8px 25px rgba(0,0,0,0.05)}
        .card h3{font-size:15px;color:#6366f1;margin-bottom:12px}
        
        .profile{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
        .avatar{width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,#a5b4fc,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:36px;color:white;font-weight:700;overflow:hidden;cursor:pointer}
        .avatar img{width:100%;height:100%;object-fit:cover}
        .info h2{font-size:22px;font-weight:700;color:#1f2937}
        .badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;margin-right:6px;margin-top:4px}
        .badge-roll{background:#fbbf24;color:#7c2d12}.badge-class{background:#6366f1;color:white}
        .meta{font-size:12px;color:#6b7280;margin-top:4px}

        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
        .stat{background:white;border-radius:14px;padding:16px;text-align:center;box-shadow:0 5px 20px rgba(0,0,0,0.04)}
        .stat h4{font-size:26px;font-weight:800;margin:4px 0}.stat p{font-size:11px;color:#6b7280}
        .st-green h4{color:#10b981}.st-red h4{color:#ef4444}.st-yellow h4{color:#f59e0b}.st-blue h4{color:#3b82f6}

        .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
        @media(max-width:768px){.grid2{grid-template-columns:1fr}}

        table{width:100%;border-collapse:collapse;font-size:12px}
        th{background:#f3f4f6;padding:8px 10px;text-align:left;font-weight:700;color:#4b5563;font-size:10px;text-transform:uppercase}
        td{padding:7px 10px;border-bottom:1px solid #e5e7eb}
        tr:hover td{background:#f9fafb}
        .mh{background:#eef2ff!important}.mh td{font-weight:700;color:#6366f1}
        .ar{background:#fef3c7!important}.or{background:linear-gradient(135deg,#6366f1,#8b5cf6)!important}.or td{color:white!important;font-weight:700}
        .sb{padding:2px 8px;border-radius:8px;font-weight:700;font-size:11px;display:inline-block}
        .sh{background:#d1fae5;color:#065f46}.sm{background:#fef3c7;color:#92400e}.sl{background:#fee2e2;color:#991b1b}

        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:0.3s}
        .modal-overlay.active{opacity:1;visibility:visible}
        .modal{background:white;border-radius:20px;padding:24px;width:90%;max-width:480px;max-height:80vh;overflow-y:auto;box-shadow:0 30px 60px rgba(0,0,0,0.15)}
        .modal h2{font-size:18px;margin-bottom:16px;color:#1f2937}
        .modal input,.modal select{width:100%;padding:10px;border:2px solid #e5e7eb;border-radius:10px;font-size:13px;font-family:inherit;margin-bottom:10px}
        .modal input:focus,.modal select:focus{outline:none;border-color:#6366f1}
        .modal button[type=submit]{width:100%;padding:12px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;border:none;border-radius:10px;font-weight:600;font-size:14px;cursor:pointer;font-family:inherit}
        .modal-close{position:absolute;top:12px;right:12px;width:30px;height:30px;border-radius:50%;border:none;background:#f3f4f6;cursor:pointer;font-size:14px}.modal-close:hover{background:#ef4444;color:white}

        .toast{position:fixed;bottom:25px;right:25px;background:#1f2937;color:white;padding:12px 20px;border-radius:10px;font-weight:600;font-size:12px;z-index:2000;transform:translateX(120%);transition:0.3s}
        .toast.show{transform:translateX(0)}.toast.ok{background:#10b981}.toast.err{background:#ef4444}
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>

    <div class="main">
        <!-- Top Bar -->
        <div class="topbar">
            <div class="logo"><span>🎓</span> THP Dashboard</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
                <button class="btn btn-out" onclick="openEdit()">✏️ Edit</button>
                <button class="btn btn-out" onclick="openPass()">🔒 Password</button>
                <button class="btn btn-red" onclick="logout()">🚪 Logout</button>
            </div>
        </div>

        <!-- Profile -->
        <div class="card">
            <div class="profile">
                <div class="avatar" id="avatar" onclick="document.getElementById('photoInput').click()"><span id="avText">?</span></div>
                <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="uploadPhoto()">
                <div class="info">
                    <h2 id="stuName">---</h2>
                    <span class="badge badge-roll" id="stuRoll">Roll --</span>
                    <span class="badge badge-class" id="stuClass">Class --</span>
                    <div class="meta">📱 <span id="stuPhone">--</span> | 📧 <span id="stuEmail">--</span> | 📍 <span id="stuAddress">--</span></div>
                </div>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats">
            <div class="stat st-green"><p>✅ Days Present</p><h4 id="presentDays">0</h4></div>
            <div class="stat st-red"><p>❌ Days Absent</p><h4 id="absentDays">0</h4></div>
            <div class="stat st-yellow"><p>📊 Average Score</p><h4 id="avgScore">-</h4></div>
            <div class="stat st-blue"><p>🏆 Best Score</p><h4 id="bestScore">-</h4></div>
        </div>

        <!-- Scores Table -->
        <div class="card">
            <h3>📝 Detailed Test Scores</h3>
            <div style="overflow-x:auto">
                <table><thead><tr><th>Month</th><th>Exam</th><th>Marks</th><th>Percentage</th><th>Grade</th><th>Sheet</th></tr></thead><tbody id="scoreBody"><tr><td colspan="6" style="text-align:center;padding:20px">Loading...</td></tr></tbody></table>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="editModal"><div class="modal"><button class="modal-close" onclick="closeMod('editModal')">✕</button><h2>✏️ Edit Profile</h2><p style="font-size:10px;color:#9ca3af;margin-bottom:10px">🔒 Name, Roll, Class, Phone are locked</p><form id="editForm">
        <input type="email" id="eEmail" placeholder="Email Address"><br>
        <input type="date" id="eDOB"><br>
        <input type="text" id="eAddress" placeholder="Address"><br>
        <input type="text" id="eFather" placeholder="Father's Name"><br>
        <input type="text" id="eMother" placeholder="Mother's Name"><br>
        <select id="eBlood"><option value="">Blood Group</option><option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>AB+</option><option>AB-</option><option>O+</option><option>O-</option></select><br>
        <select id="eGender"><option value="">Gender</option><option>Male</option><option>Female</option><option>Other</option></select><br>
        <button type="submit">💾 Save Changes</button>
    </form></div></div>

    <!-- Password Modal -->
    <div class="modal-overlay" id="passModal"><div class="modal"><button class="modal-close" onclick="closeMod('passModal')">✕</button><h2>🔒 Change Password</h2><form id="passForm">
        <input type="password" id="curPass" placeholder="Current Password" required><br>
        <input type="password" id="newPass" placeholder="New Password (min 8)" minlength="8" required><br>
        <input type="password" id="confPass" placeholder="Confirm Password" minlength="8" required><br>
        <button type="submit">🔐 Update Password</button>
    </form></div></div>

    <script>
        // FIREBASE
        firebase.initializeApp({apiKey:"AIzaSyAjjjVn1JO3vVgO89yEqontYxwvi-fnetQ",authDomain:"dumbbell-gyme.firebaseapp.com",projectId:"dumbbell-gyme",storageBucket:"dumbbell-gyme.firebasestorage.app",messagingSenderId:"305021976299",appId:"1:305021976299:web:fb85c2b332935d698088ae"});
        const db=firebase.firestore();
        const IK='53fb01955a45c5462724b8f7d238500a';
        let cur=null;

        function toast(m,t='ok'){const el=document.getElementById('toast');el.textContent=(t==='ok'?'✅ ':'❌ ')+m;el.className=`toast ${t} show`;setTimeout(()=>el.classList.remove('show'),2500)}
        function openMod(id){document.getElementById(id).classList.add('active')}
        function closeMod(id){document.getElementById(id).classList.remove('active')}
        function openEdit(){openMod('editModal')}
        function openPass(){document.getElementById('passForm').reset();openMod('passModal')}
        function logout(){localStorage.removeItem('thp_current_student');location.href='index.html'}
        document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',function(e){if(e.target===this)this.classList.remove('active')}));

        async function init(){
            const sd=localStorage.getItem('thp_current_student');
            if(!sd){location.href='index.html';return}
            cur=JSON.parse(sd);
            console.log('Roll:',cur.rollNo);

            const doc=await db.collection('students').doc(String(cur.rollNo)).get();
            if(!doc.exists){toast('Not found!','err');return}
            const d=doc.data();
            console.log('Loaded:',d.name);

            // Profile
            document.getElementById('stuName').textContent=d.name||'---';
            document.getElementById('stuRoll').textContent='Roll No. '+(d.rollNo||'--');
            document.getElementById('stuClass').textContent='Class '+(d.class||'--');
            document.getElementById('stuPhone').textContent=d.phone||'--';
            document.getElementById('stuEmail').textContent=d.email||'--';
            document.getElementById('stuAddress').textContent=d.address||'--';
            
            const av=document.getElementById('avatar');
            if(d.profilePhoto){av.innerHTML=`<img src="${d.profilePhoto}" style="width:100%;height:100%;object-fit:cover">`}
            else{document.getElementById('avText').textContent=(d.name||'?').charAt(0).toUpperCase()}

            // Stats
            const att=d.attendance||{};let p=0,a=0;Object.values(att).forEach(v=>{if(v==='present')p++;else a++});
            document.getElementById('presentDays').textContent=p;document.getElementById('absentDays').textContent=a;

            const ts=d.testScores||{};let all=[];Object.values(ts).forEach(md=>{if(typeof md==='object')Object.values(md).forEach(ex=>{const pct=(typeof ex==='object'?Number(ex.percentage||0):Number(ex));if(!isNaN(pct))all.push(pct)})});
            if(all.length){document.getElementById('avgScore').textContent=Math.round(all.reduce((x,y)=>x+y,0)/all.length)+'%';document.getElementById('bestScore').textContent=Math.max(...all)+'%'}

            // Scores Table
            const months=['March','April','May','June','July','August','September','October','November','December','January','February'];
            let html='',tsum=0,tcnt=0;
            months.forEach(m=>{const md=ts[m];if(md&&typeof md==='object'&&Object.keys(md).length>0){let ms=0,mc=0;html+=`<tr class="mh"><td colspan="6">📅 ${m}</td></tr>`;Object.entries(md).forEach(([en,ex])=>{const pct=(typeof ex==='object'?Number(ex.percentage||0):Number(ex));const marks=(typeof ex==='object'?`${ex.marks||'-'}/${ex.total||'-'}`:'-');const sheet=(typeof ex==='object'&&ex.answerSheet?ex.answerSheet:'');let gc='sh',g='A';if(pct<40){gc='sl';g='F'}else if(pct<60){gc='sm';g='C'}else if(pct<75){gc='sm';g='B'}ms+=pct;mc++;html+=`<tr><td style="padding-left:16px">📝 ${en}</td><td><strong>${marks}</strong></td><td><span class="sb ${gc}">${pct}%</span></td><td><strong>${g}</strong></td><td>${sheet?`<a href="${sheet}" target="_blank">📷 View</a>`:'-'}</td></tr>`});if(mc>0){tsum+=ms;tcnt+=mc;html+=`<tr class="ar"><td style="padding-left:16px">📊 ${m} Avg</td><td colspan="2"><strong>${Math.round(ms/mc)}%</strong></td><td colspan="2">${mc} exams</td></tr>`}}});
            if(tcnt>0)html=`<tr class="or"><td><strong>🏆 OVERALL</strong></td><td colspan="2"><strong>${Math.round(tsum/tcnt)}%</strong></td><td colspan="2">${tcnt} exams total</td></tr>`+html;
            document.getElementById('scoreBody').innerHTML=html||'<tr><td colspan="6" style="text-align:center;padding:20px">No scores yet</td></tr>';

            // Edit form
            document.getElementById('eEmail').value=d.email||'';document.getElementById('eDOB').value=d.dateOfBirth||'';
            document.getElementById('eAddress').value=d.address||'';document.getElementById('eFather').value=d.fatherName||'';
            document.getElementById('eMother').value=d.motherName||'';document.getElementById('eBlood').value=d.bloodGroup||'';
            document.getElementById('eGender').value=d.gender||'';
        }

        async function uploadPhoto(){
            const f=document.getElementById('photoInput').files[0];if(!f)return;
            toast('Uploading...','ok');
            const fd=new FormData();fd.append('image',f);
            const r=await fetch(`https://api.imgbb.com/1/upload?key=${IK}`,{method:'POST',body:fd});
            const j=await r.json();
            if(j.success){await db.collection('students').doc(String(cur.rollNo)).update({profilePhoto:j.data.url});toast('Done!','ok');init()}
        }

        document.getElementById('editForm').addEventListener('submit',async e=>{e.preventDefault();
            await db.collection('students').doc(String(cur.rollNo)).update({email:document.getElementById('eEmail').value.trim(),dateOfBirth:document.getElementById('eDOB').value,address:document.getElementById('eAddress').value.trim(),fatherName:document.getElementById('eFather').value.trim(),motherName:document.getElementById('eMother').value.trim(),bloodGroup:document.getElementById('eBlood').value,gender:document.getElementById('eGender').value});
            toast('Updated!','ok');closeMod('editModal');init();
        });

        document.getElementById('passForm').addEventListener('submit',async e=>{e.preventDefault();
            const cp=document.getElementById('curPass').value,np=document.getElementById('newPass').value,xp=document.getElementById('confPass').value;
            if(np!==xp){toast('Not match!','err');return}
            const d=await db.collection('students').doc(String(cur.rollNo)).get();
            if(d.data().password!==cp){toast('Wrong password!','err');return}
            await db.collection('students').doc(String(cur.rollNo)).update({password:np});
            toast('Changed!','ok');closeMod('passModal');
        });

        init();
    </script>
</body>
</html>
