<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body{font-family:Arial;padding:20px;background:#f0f4ff}
        .card{background:white;padding:20px;border-radius:15px;margin:10px 0;box-shadow:0 5px 20px rgba(0,0,0,0.08)}
        h2{color:#6366f1} .badge{display:inline-block;padding:5px 12px;border-radius:20px;font-weight:700;font-size:14px}
        .roll{background:#fbbf24;color:#7c2d12} .class{background:#6366f1;color:white;margin-left:5px}
        table{width:100%;border-collapse:collapse;margin-top:10px}
        td,th{padding:8px;border-bottom:1px solid #e5e7eb;font-size:13px}
        th{background:#f3f4f6;text-align:left}
        button{padding:10px 20px;background:#ef4444;color:white;border:none;border-radius:8px;cursor:pointer;font-weight:600}
    </style>
</head>
<body>
    <h2>🎓 Student Dashboard</h2>
    
    <div class="card">
        <h3>Profile</h3>
        <p><strong>Name:</strong> <span id="name">---</span></p>
        <p><strong>Roll No:</strong> <span id="roll" class="badge roll">---</span></p>
        <p><strong>Class:</strong> <span id="cls" class="badge class">---</span></p>
        <p><strong>Phone:</strong> <span id="phone">---</span></p>
        <p><strong>Email:</strong> <span id="email">---</span></p>
    </div>

    <div class="card">
        <h3>Attendance</h3>
        <p>✅ Present: <strong id="present">0</strong> days</p>
        <p>❌ Absent: <strong id="absent">0</strong> days</p>
    </div>

    <div class="card">
        <h3>Test Scores</h3>
        <table><thead><tr><th>Month</th><th>Exam</th><th>Marks</th><th>Percentage</th></tr></thead><tbody id="scores"></tbody></table>
    </div>

    <button onclick="logout()">🚪 Logout</button>

    <script>
        // FIREBASE
        firebase.initializeApp({apiKey:"AIzaSyAjjjVn1JO3vVgO89yEqontYxwvi-fnetQ",authDomain:"dumbbell-gyme.firebaseapp.com",projectId:"dumbbell-gyme",storageBucket:"dumbbell-gyme.firebasestorage.app",messagingSenderId:"305021976299",appId:"1:305021976299:web:fb85c2b332935d698088ae"});
        const db = firebase.firestore();

        function logout(){localStorage.removeItem('thp_current_student');location.href='index.html'}

        async function loadData() {
            const sd = localStorage.getItem('thp_current_student');
            if (!sd) { location.href = 'index.html'; return; }
            
            const student = JSON.parse(sd);
            console.log('📱 Loading Roll No:', student.rollNo);
            
            try {
                // DIRECT FETCH
                const docRef = db.collection('students').doc(String(student.rollNo));
                const doc = await docRef.get();
                
                if (!doc.exists) {
                    console.error('❌ NOT FOUND in Firestore!');
                    document.body.innerHTML = '<h1 style="color:red;text-align:center;padding:50px">❌ Student data not found!<br>Roll No: '+student.rollNo+'<br><br>Contact Admin</h1>';
                    return;
                }
                
                const data = doc.data();
                console.log('✅ LOADED:', data.name);
                console.log('📊 Full data:', JSON.stringify(data, null, 2));
                
                // Display
                document.getElementById('name').textContent = data.name || '---';
                document.getElementById('roll').textContent = 'Roll No. ' + (data.rollNo || '---');
                document.getElementById('cls').textContent = 'Class ' + (data.class || '---');
                document.getElementById('phone').textContent = data.phone || '---';
                document.getElementById('email').textContent = data.email || '---';
                
                // Attendance
                const att = data.attendance || {};
                let p = 0, a = 0;
                Object.values(att).forEach(v => { if (v === 'present') p++; else a++; });
                document.getElementById('present').textContent = p;
                document.getElementById('absent').textContent = a;
                
                // Scores
                const ts = data.testScores || {};
                let html = '';
                Object.entries(ts).forEach(([month, exams]) => {
                    if (typeof exams === 'object') {
                        Object.entries(exams).forEach(([ename, edata]) => {
                            let marks = '-', total = '-', pct = '-';
                            if (typeof edata === 'object') {
                                marks = edata.marks || '-';
                                total = edata.total || '-';
                                pct = (edata.percentage || '-') + '%';
                            } else if (typeof edata === 'number') {
                                pct = edata + '%';
                            }
                            html += `<tr><td>${month}</td><td>${ename}</td><td>${marks}/${total}</td><td><strong>${pct}</strong></td></tr>`;
                        });
                    }
                });
                document.getElementById('scores').innerHTML = html || '<tr><td colspan="4">No scores yet</td></tr>';
                
            } catch (error) {
                console.error('❌ ERROR:', error.message);
                document.body.innerHTML = '<h1 style="color:red;text-align:center;padding:50px">❌ Error: '+error.message+'</h1>';
            }
        }

        loadData();
    </script>
</body>
</html>
