<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - THP</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Poppins',sans-serif;background:#f0f4ff;padding:20px}
        .card{background:white;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 4px 15px rgba(0,0,0,0.06)}
        h1{font-size:24px;color:#1f2937}h2{font-size:16px;color:#6366f1;margin-bottom:12px}
        .badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;margin-right:8px}
        .badge-roll{background:#fef3c7;color:#92400e}.badge-class{background:#e0e7ff;color:#4338ca}
        table{width:100%;border-collapse:collapse;font-size:13px}
        th{background:#f9fafb;padding:10px;text-align:left;font-weight:700;border-bottom:2px solid #e5e7eb}
        td{padding:10px;border-bottom:1px solid #f3f4f6}
        .sc-high{color:#059669;font-weight:700}.sc-mid{color:#d97706;font-weight:700}.sc-low{color:#dc2626;font-weight:700}
        button{background:#6366f1;color:white;border:none;padding:10px 20px;border-radius:10px;font-weight:600;cursor:pointer;font-family:inherit;font-size:14px}
        button:hover{background:#4f46e5}
        .load-overlay{position:fixed;inset:0;background:rgba(255,255,255,0.9);display:flex;align-items:center;justify-content:center;z-index:999;font-weight:600;color:#6366f1;font-size:16px}
    </style>
</head>
<body>
    <div class="load-overlay" id="loader">⏳ Loading...</div>

    <div class="card">
        <h1 id="stuName">---</h1>
        <div style="margin-top:8px">
            <span class="badge badge-roll" id="stuRoll">Roll --</span>
            <span class="badge badge-class" id="stuClass">Class --</span>
        </div>
        <p style="margin-top:8px;color:#6b7280">📱 <span id="stuPhone">--</span> | 📧 <span id="stuEmail">--</span></p>
    </div>

    <div class="card">
        <h2>📊 Test Scores</h2>
        <table>
            <thead><tr><th>Month</th><th>Exam</th><th>Marks</th><th>%</th><th>Grade</th></tr></thead>
            <tbody id="scoresBody"><tr><td colspan="5">Loading...</td></tr></tbody>
        </table>
    </div>

    <div class="card">
        <h2>📅 Attendance</h2>
        <p>✅ Present: <strong id="presentDays">0</strong> days</p>
        <p>❌ Absent: <strong id="absentDays">0</strong> days</p>
    </div>

    <button onclick="logout()">🚪 Logout</button>

    <script>
        firebase.initializeApp({apiKey:"AIzaSyAjjjVn1JO3vVgO89yEqontYxwvi-fnetQ",authDomain:"dumbbell-gyme.firebaseapp.com",projectId:"dumbbell-gyme",storageBucket:"dumbbell-gyme.firebasestorage.app",messagingSenderId:"305021976299",appId:"1:305021976299:web:fb85c2b332935d698088ae"});
        const db=firebase.firestore();

        const sd=localStorage.getItem('thp_current_student');
        if(!sd){location.href='index.html'}
        const cur=JSON.parse(sd);

        async function load(){
            try{
                const doc=await db.collection('students').doc(String(cur.rollNo)).get();
                if(!doc.exists){document.getElementById('loader').textContent='Student not found!';return}
                const d=doc.data();

                document.getElementById('stuName').textContent=d.name;
                document.getElementById('stuRoll').textContent='Roll '+d.rollNo;
                document.getElementById('stuClass').textContent='Class '+d.class;
                document.getElementById('stuPhone').textContent=d.phone||'--';
                document.getElementById('stuEmail').textContent=d.email||'--';

                // Attendance
                const att=d.attendance||{};let p=0,a=0;
                Object.values(att).forEach(v=>{if(v==='present')p++;else a++;});
                document.getElementById('presentDays').textContent=p;
                document.getElementById('absentDays').textContent=a;

                // Scores
                const ts=d.testScores||{};
                const months=['March','April','May','June','July','August','September','October','November','December','January','February'];
                let html='';
                
                months.forEach(mo=>{
                    const md=ts[mo];
                    if(md&&typeof md==='object'){
                        Object.entries(md).forEach(([en,ed])=>{
                            let marks='-',total='-',pct='-',grade='-',cls='';
                            if(typeof ed==='object'){
                                marks=ed.marks!==undefined?ed.marks:'-';
                                total=ed.total!==undefined?ed.total:'-';
                                pct=ed.percentage!==undefined?ed.percentage:'-';
                            }else if(typeof ed==='number'){pct=ed;marks=ed;total=100}
                            if(pct!=='-'){
                                const pv=Number(pct);
                                if(pv>=75){cls='sc-high';grade='A'}else if(pv>=40){cls='sc-mid';grade='C'}else{cls='sc-low';grade='F'}
                            }
                            html+=`<tr><td>${mo}</td><td>${en}</td><td>${marks}/${total}</td><td class="${cls}">${pct}%</td><td><strong>${grade}</strong></td></tr>`;
                        });
                    }
                });
                
                document.getElementById('scoresBody').innerHTML=html||'<tr><td colspan="5">No scores yet</td></tr>';
                document.getElementById('loader').style.display='none';
            }catch(e){
                document.getElementById('loader').textContent='Error: '+e.message;
            }
        }

        function logout(){localStorage.removeItem('thp_current_student');location.href='index.html'}
        load();
    </script>
</body>
</html>
