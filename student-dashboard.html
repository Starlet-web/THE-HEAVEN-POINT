<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - THP</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#f0f4ff,#e8ecf8,#f5f3ff);min-height:100vh;padding:20px;color:#1f2937}
        .container{max-width:1000px;margin:0 auto}
        .card{background:rgba(255,255,255,0.9);border-radius:20px;padding:22px;margin-bottom:18px;box-shadow:0 8px 30px rgba(0,0,0,0.06)}
        h1{font-size:24px;font-weight:800}h2{font-size:16px;color:#6366f1;margin-bottom:14px}
        .badge{display:inline-block;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;margin-right:8px}
        .badge-roll{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#7c2d12}
        .badge-class{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white}
        .meta{display:flex;gap:16px;flex-wrap:wrap;margin-top:8px;font-size:13px;color:#6b7280}
        .meta i{color:#6366f1;width:16px}
        
        .profile-row{display:flex;gap:24px;align-items:center;flex-wrap:wrap}
        .profile-photo{width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,#a5b4fc,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:42px;color:white;font-weight:700;cursor:pointer;position:relative;overflow:hidden;box-shadow:0 8px 25px rgba(99,102,241,0.3);flex-shrink:0}
        .profile-photo img{width:100%;height:100%;object-fit:cover;border-radius:50%}
        .photo-overlay{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.6);color:white;text-align:center;padding:5px;font-size:9px;opacity:0;transition:all 0.3s}
        .profile-photo:hover .photo-overlay{opacity:1}
        .profile-info{flex:1;min-width:200px}

        .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
        .chart-box{height:250px}canvas{width:100%!important;height:100%!important}
        .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center;font-size:11px}
        .cal-h{font-weight:700;color:#9ca3af;padding:4px 0}.cal-d{padding:7px 3px;border-radius:6px;font-weight:600}
        .cal-p{background:#10b981;color:white}.cal-a{background:#ef4444;color:white}.cal-t{border:2px solid#6366f1}
        
        table{width:100%;border-collapse:collapse;font-size:13px}
        th{background:#f9fafb;padding:10px;text-align:left;font-weight:700;border-bottom:2px solid #e5e7eb;font-size:11px;text-transform:uppercase;color:#6b7280}
        td{padding:10px;border-bottom:1px solid #f3f4f6}
        .sc-h{color:#059669;font-weight:700}.sc-m{color:#d97706;font-weight:700}.sc-l{color:#dc2626;font-weight:700}
        
        .stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
        .stat-box{background:rgba(255,255,255,0.9);border-radius:16px;padding:16px;text-align:center;box-shadow:0 4px 15px rgba(0,0,0,0.04);border-top:3px solid #10b981}
        .stat-box.abs{border-top-color:#ef4444}.stat-box.avg{border-top-color:#f59e0b}.stat-box.best{border-top-color:#3b82f6}
        .stat-val{font-size:28px;font-weight:800}.stat-lbl{font-size:10px;color:#9ca3af;font-weight:600;text-transform:uppercase;margin-top:2px}
        
        .btn{background:#6366f1;color:white;border:none;padding:8px 16px;border-radius:10px;font-weight:600;cursor:pointer;font-family:inherit;font-size:12px;transition:all 0.3s}
        .btn:hover{background:#4f46e5;transform:translateY(-1px)}
        .btn-o{background:white;color:#6366f1;border:2px solid #c7d2fe}.btn-o:hover{background:#6366f1;color:white}
        .btn-sm{padding:6px 12px;font-size:11px}

        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all 0.3s}
        .modal-overlay.active{opacity:1;visibility:visible}
        .modal{background:white;border-radius:20px;padding:24px;width:90%;max-width:500px;max-height:80vh;overflow-y:auto;box-shadow:0 30px 60px rgba(0,0,0,0.2)}
        .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
        .modal-close{cursor:pointer;font-size:20px;width:32px;height:32px;border-radius:50%;border:none;background:#f3f4f6;display:flex;align-items:center;justify-content:center}
        .modal-close:hover{background:#ef4444;color:white}
        .form-group{margin-bottom:12px}
        .form-group label{display:block;font-size:10px;font-weight:700;color:#374151;margin-bottom:3px;text-transform:uppercase}
        .form-group input,.form-group textarea{width:100%;padding:9px 12px;border:2px solid #e5e7eb;border-radius:9px;font-size:13px;font-family:inherit}
        .form-group input:focus,.form-group textarea:focus{outline:none;border-color:#6366f1}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .locked{background:#f3f4f6!important;color:#9ca3af!important;cursor:not-allowed!important}

        .loader{position:fixed;inset:0;background:rgba(255,255,255,0.9);display:flex;align-items:center;justify-content:center;z-index:999;font-weight:600;color:#6366f1;font-size:15px;flex-direction:column;gap:10px}
        .spinner{width:36px;height:36px;border:3px solid #e5e7eb;border-top-color:#6366f1;border-radius:50%;animation:spin 0.7s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .toast{position:fixed;bottom:20px;right:20px;background:#1f2937;color:white;padding:12px 20px;border-radius:10px;font-weight:600;font-size:12px;z-index:2000;transform:translateX(120%);transition:all 0.3s;box-shadow:0 20px 50px rgba(0,0,0,0.2)}.toast.show{transform:translateX(0)}.toast.s{background:#10b981}.toast.e{background:#ef4444}

        .detail-row{display:flex;gap:20px;flex-wrap:wrap;margin-top:8px}
        .detail-item{font-size:12px;color:#6b7280}.detail-item strong{color:#374151}

        @media(max-width:768px){.grid-2{grid-template-columns:1fr}.stat-row{grid-template-columns:repeat(2,1fr)}.form-row{grid-template-columns:1fr}.profile-row{flex-direction:column;text-align:center}}
    </style>
</head>
<body>
    <div class="loader" id="loader"><div class="spinner"></div>Loading...</div>
    <div class="toast" id="toast"></div>

    <div class="container">
        <!-- PROFILE CARD -->
        <div class="card">
            <div class="profile-row">
                <div class="profile-photo" id="profilePhoto" onclick="document.getElementById('photoInput').click()">
                    <span id="photoInitial">S</span>
                    <div class="photo-overlay">📷 Change</div>
                </div>
                <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="uploadPhoto(event)">
                <div class="profile-info">
                    <h1 id="stuName">---</h1>
                    <div style="margin:6px 0"><span class="badge badge-roll" id="stuRoll">Roll --</span><span class="badge badge-class" id="stuClass">Class --</span></div>
                    <div class="meta">
                        <span><i class="fas fa-phone"></i> <span id="stuPhone">--</span></span>
                        <span><i class="fas fa-envelope"></i> <span id="stuEmail">--</span></span>
                    </div>
                    <div class="detail-row" style="margin-top:8px">
                        <span class="detail-item"><i class="fas fa-map-marker-alt" style="color:#6366f1"></i> <span id="stuAddr">--</span></span>
                        <span class="detail-item"><i class="fas fa-calendar" style="color:#6366f1"></i> <span id="stuDOB">--</span></span>
                        <span class="detail-item"><i class="fas fa-user" style="color:#6366f1"></i> <span id="stuFather">--</span></span>
                        <span class="detail-item"><i class="fas fa-user" style="color:#6366f1"></i> <span id="stuMother">--</span></span>
                    </div>
                    <button class="btn btn-o btn-sm" style="margin-top:8px" onclick="openEdit()"><i class="fas fa-edit"></i> Edit Details</button>
                </div>
            </div>
        </div>

        <!-- STATS -->
        <div class="stat-row">
            <div class="stat-box"><div class="stat-val" id="presentDays">0</div><div class="stat-lbl">Present</div></div>
            <div class="stat-box abs"><div class="stat-val" id="absentDays">0</div><div class="stat-lbl">Absent</div></div>
            <div class="stat-box avg"><div class="stat-val" id="avgScore">0%</div><div class="stat-lbl">Avg Score</div></div>
            <div class="stat-box best"><div class="stat-val" id="bestScore">0%</div><div class="stat-lbl">Best Score</div></div>
        </div>

        <!-- CHARTS -->
        <div class="grid-2">
            <div class="card"><h2>📈 Scores Trend</h2><div class="chart-box"><canvas id="scoresChart"></canvas></div></div>
            <div class="card"><h2>📅 Attendance <span id="calMonth" style="font-size:11px;color:#9ca3af;float:right"></span></h2><div class="cal-grid" id="calGrid"></div></div>
        </div>

        <!-- SCORES TABLE -->
        <div class="card">
            <h2>📋 Test Scores</h2>
            <table><thead><tr><th>Month</th><th>Exam</th><th>Marks</th><th>%</th><th>Grade</th></tr></thead><tbody id="scoresBody"></tbody></table>
        </div>

        <button class="btn" onclick="logout()">🚪 Logout</button>
    </div>

    <!-- EDIT MODAL -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-head"><h2>✏️ Edit Details</h2><span class="modal-close" onclick="closeMod('editModal')">✕</span></div>
            <form id="editForm">
                <div class="form-row"><div class="form-group"><label>Roll No (Locked)</label><input class="locked" id="eRoll" disabled></div><div class="form-group"><label>Name (Locked)</label><input class="locked" id="eName" disabled></div></div>
                <div class="form-row"><div class="form-group"><label>Class (Locked)</label><input class="locked" id="eClass" disabled></div><div class="form-group"><label>Phone (Locked)</label><input class="locked" id="ePhone" disabled></div></div>
                <hr style="margin:12px 0;border-color:#e5e7eb">
                <div class="form-group"><label>📧 Email</label><input type="email" id="eEmail"></div>
                <div class="form-row"><div class="form-group"><label>🎂 Date of Birth</label><input type="date" id="eDOB"></div><div class="form-group"><label>📍 Address</label><input id="eAddr"></div></div>
                <div class="form-row"><div class="form-group"><label>👨 Father</label><input id="eFather"></div><div class="form-group"><label>👩 Mother</label><input id="eMother"></div></div>
                <button type="submit" class="btn" style="width:100%;margin-top:8px"><i class="fas fa-save"></i> Save</button>
            </form>
        </div>
    </div>

    <script>
        firebase.initializeApp({apiKey:"AIzaSyAjjjVn1JO3vVgO89yEqontYxwvi-fnetQ",authDomain:"dumbbell-gyme.firebaseapp.com",projectId:"dumbbell-gyme",storageBucket:"dumbbell-gyme.firebasestorage.app",messagingSenderId:"305021976299",appId:"1:305021976299:web:fb85c2b332935d698088ae"});
        const db=firebase.firestore(),IK='53fb01955a45c5462724b8f7d238500a';
        let scoresChart=null;

        const sd=localStorage.getItem('thp_current_student');
        if(!sd){location.href='index.html'}
        const cur=JSON.parse(sd);

        setTimeout(()=>{const l=document.getElementById('loader');if(l)l.style.display='none'},4000);

        function toast(m,t='s'){const e=document.getElementById('toast');e.textContent=m;e.className=`toast ${t} show`;setTimeout(()=>e.classList.remove('show'),2500)}
        function openMod(id){document.getElementById(id).classList.add('active')}
        function closeMod(id){document.getElementById(id).classList.remove('active')}
        document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',function(e){if(e.target===this)this.classList.remove('active')}));

        async function load(){
            try{
                const doc=await db.collection('students').doc(String(cur.rollNo)).get();
                if(!doc.exists){document.getElementById('loader').textContent='Not found!';return}
                const d=doc.data();

                // Profile
                document.getElementById('stuName').textContent=d.name||'---';
                document.getElementById('stuRoll').textContent='Roll '+d.rollNo;
                document.getElementById('stuClass').textContent='Class '+d.class;
                document.getElementById('stuPhone').textContent=d.phone||'--';
                document.getElementById('stuEmail').textContent=d.email||'Not set';
                document.getElementById('stuAddr').textContent=d.address||'Not set';
                document.getElementById('stuDOB').textContent=d.dateOfBirth||'Not set';
                document.getElementById('stuFather').textContent=(d.fatherName?'Father: '+d.fatherName:'')||'';
                document.getElementById('stuMother').textContent=(d.motherName?'Mother: '+d.motherName:'')||'';

                // Photo
                const ph=document.getElementById('profilePhoto');
                if(d.profilePhoto){ph.innerHTML=`<img src="${d.profilePhoto}"><div class="photo-overlay">📷 Change</div>`}
                else{document.getElementById('photoInitial').textContent=(d.name||'S')[0].toUpperCase()}

                // Edit form
                document.getElementById('eRoll').value=d.rollNo||'';document.getElementById('eName').value=d.name||'';
                document.getElementById('eClass').value=d.class||'';document.getElementById('ePhone').value=d.phone||'';
                document.getElementById('eEmail').value=d.email||'';document.getElementById('eDOB').value=d.dateOfBirth||'';
                document.getElementById('eAddr').value=d.address||'';document.getElementById('eFather').value=d.fatherName||'';
                document.getElementById('eMother').value=d.motherName||'';

                // Stats
                const att=d.attendance||{};let p=0,a=0;
                Object.values(att).forEach(v=>{if(v==='present')p++;else a++;});
                document.getElementById('presentDays').textContent=p;document.getElementById('absentDays').textContent=a;

                // Calendar
                const now=new Date(),m=now.getMonth(),y=now.getFullYear();
                document.getElementById('calMonth').textContent=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m]+' '+y;
                const dim=new Date(y,m+1,0).getDate(),fd=new Date(y,m,1).getDay();
                let cal='';'SMTWTFS'.split('').forEach(dd=>cal+=`<div class="cal-h">${dd}</div>`);
                for(let i=0;i<fd;i++)cal+='<div></div>';
                for(let d=1;d<=dim;d++){const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,st=att[ds];let cls='cal-d';if(st==='present')cls+=' cal-p';else if(st==='absent')cls+=' cal-a';if(d===now.getDate())cls+=' cal-t';cal+=`<div class="${cls}">${d}</div>`}
                document.getElementById('calGrid').innerHTML=cal;

                // Scores
                const ts=d.testScores||{};
                const months=['March','April','May','June','July','August','September','October','November','December','January','February'];
                let allP=[],html='';

                months.forEach(mo=>{
                    const md=ts[mo];
                    if(md&&typeof md==='object'&&Object.keys(md).length>0){
                        html+=`<tr style="background:#f0f4ff"><td colspan="5"><strong>📅 ${mo}</strong></td></tr>`;
                        Object.entries(md).forEach(([en,ed])=>{
                            let mr='-',tt='-',pct='-',g='-',cl='';
                            if(typeof ed==='object'&&ed!==null){
                                mr=ed.marks||ed.score||ed.obtained||'-';
                                tt=ed.total||ed.maxMarks||ed.outOf||'-';
                                pct=ed.percentage||ed.percent||'-';
                                if(pct==='-'&&mr!=='-'&&tt!=='-'&&Number(tt)>0)pct=Math.round((Number(mr)/Number(tt))*100);
                            }else if(typeof ed==='number'){mr=ed;tt=100;pct=ed}
                            if(pct!=='-'){const pv=Number(pct);if(!isNaN(pv)){allP.push(pv);if(pv>=90){cl='sc-h';g='A+'}else if(pv>=75){cl='sc-h';g='A'}else if(pv>=60){cl='sc-m';g='B'}else if(pv>=40){cl='sc-m';g='C'}else{cl='sc-l';g='F'}}}
                            html+=`<tr><td></td><td>📝 ${en}</td><td>${mr}/${tt}</td><td class="${cl}">${pct}%</td><td><strong>${g}</strong></td></tr>`;
                        });
                    }
                });
                document.getElementById('scoresBody').innerHTML=html||'<tr><td colspan="5" style="text-align:center;padding:20px;color:#9ca3af">No test scores yet</td></tr>';
                if(allP.length>0){document.getElementById('avgScore').textContent=Math.round(allP.reduce((x,y)=>x+y,0)/allP.length)+'%';document.getElementById('bestScore').textContent=Math.max(...allP)+'%'}

                // Chart
                try{
                    const ctx=document.getElementById('scoresChart')?.getContext('2d');
                    if(ctx){
                        const chData=months.map(mo=>{const md=ts[mo];if(md&&typeof md==='object'){const pcts=[];Object.values(md).forEach(ed=>{let pct=null;if(typeof ed==='object')pct=ed.percentage||ed.percent;else if(typeof ed==='number')pct=ed;if(pct&&!isNaN(Number(pct)))pcts.push(Number(pct))});return pcts.length?Math.round(pcts.reduce((a,b)=>a+b,0)/pcts.length):null}return null});
                        if(scoresChart)try{scoresChart.destroy()}catch(e){}
                        scoresChart=new Chart(ctx,{type:'line',data:{labels:['Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec','Jan','Feb'],datasets:[{label:'Avg %',data:chData,borderColor:'#6366f1',backgroundColor:'rgba(99,102,241,0.05)',borderWidth:3,fill:true,tension:0.4,pointRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:100}}}});
                    }
                }catch(e){}

                document.getElementById('loader').style.display='none';
            }catch(e){document.getElementById('loader').textContent='Error: '+e.message}
        }

        async function uploadPhoto(ev){
            const f=ev.target.files[0];if(!f)return;if(f.size>5e6){toast('Max 5MB','e');return}
            toast('Uploading...','s');
            try{
                const fd=new FormData();fd.append('image',f);
                const r=await fetch(`https://api.imgbb.com/1/upload?key=${IK}`,{method:'POST',body:fd});
                const j=await r.json();
                if(j.success){
                    await db.collection('students').doc(String(cur.rollNo)).update({profilePhoto:j.data.url});
                    document.getElementById('profilePhoto').innerHTML=`<img src="${j.data.url}"><div class="photo-overlay">📷 Change</div>`;
                    toast('Photo updated!','s');
                }
            }catch(e){toast('Failed','e')}
        }

        function openEdit(){openMod('editModal')}
        document.getElementById('editForm').addEventListener('submit',async(e)=>{
            e.preventDefault();
            const u={
                email:document.getElementById('eEmail').value.trim(),
                dateOfBirth:document.getElementById('eDOB').value,
                address:document.getElementById('eAddr').value.trim(),
                fatherName:document.getElementById('eFather').value.trim(),
                motherName:document.getElementById('eMother').value.trim()
            };
            try{await db.collection('students').doc(String(cur.rollNo)).update(u);toast('Updated!','s');closeMod('editModal');load()}catch(er){toast('Failed','e')}
        });

        function logout(){localStorage.removeItem('thp_current_student');location.href='index.html'}
        load();
    </script>
</body>
</html>
