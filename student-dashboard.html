<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>THP • Student Portal</title>
  <!-- Firebase & Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at 10% 20%, #f0f4ff, #e8ecfc, #f5f3ff);
      min-height: 100vh;
      padding: 1.5rem;
      color: #1f2937;
      display: flex;
      justify-content: center;
    }
    .container { max-width: 1100px; width: 100%; }
    .card {
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 2rem;
      padding: 1.6rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 15px 40px rgba(0,0,0,0.05), 0 2px 8px rgba(99,102,241,0.08);
      border: 1px solid rgba(255,255,255,0.7);
      transition: transform 0.2s;
    }
    .card:hover { transform: translateY(-2px); }
    h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.5px; }
    h2 { font-size: 1.1rem; font-weight: 700; color: #4f46e5; margin-bottom: 1.2rem; display: flex; align-items: center; gap: 0.5rem; }
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 0.35rem 1.1rem; border-radius: 2rem; font-size: 0.75rem; font-weight: 700;
      letter-spacing: 0.3px; margin-right: 8px;
    }
    .badge-roll { background: linear-gradient(135deg,#fbbf24,#f59e0b); color: #7c2d12; }
    .badge-class { background: linear-gradient(135deg,#6366f1,#8b5cf6); color: white; }
    .meta { display: flex; flex-wrap: wrap; gap: 1.2rem; margin-top: 0.5rem; font-size: 0.85rem; color: #4b5563; }
    .meta i { color: #6366f1; width: 18px; }

    .profile-row { display: flex; align-items: center; gap: 1.8rem; flex-wrap: wrap; }
    .profile-photo {
      width: 110px; height: 110px; border-radius: 50%;
      background: linear-gradient(135deg, #a5b4fc, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem; color: white; font-weight: 700; cursor: pointer;
      position: relative; overflow: hidden; box-shadow: 0 15px 25px rgba(99,102,241,0.35);
      flex-shrink: 0; transition: 0.3s;
    }
    .profile-photo img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .photo-overlay {
      position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.7);
      color: white; text-align: center; padding: 6px; font-size: 0.7rem; font-weight: 500;
      opacity: 0; transition: 0.3s; backdrop-filter: blur(4px);
    }
    .profile-photo:hover .photo-overlay { opacity: 1; }
    .profile-info { flex: 1; min-width: 220px; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.4rem; }
    .chart-box { height: 240px; position: relative; }
    canvas { width: 100% !important; height: 100% !important; }

    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; text-align: center; font-size: 0.75rem; }
    .cal-h { font-weight: 700; color: #9ca3af; padding: 6px 0; }
    .cal-d { padding: 0.5rem 0.2rem; border-radius: 0.6rem; font-weight: 600; transition: 0.2s; }
    .cal-p { background: #10b981; color: white; }
    .cal-a { background: #ef4444; color: white; }
    .cal-t { border: 2px solid #6366f1; font-weight: 800; }

    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    th { background: #f9fafb; padding: 0.8rem; text-align: left; font-weight: 700; border-bottom: 2px solid #e5e7eb; font-size: 0.7rem; text-transform: uppercase; color: #6b7280; }
    td { padding: 0.7rem; border-bottom: 1px solid #f3f4f6; }
    .sc-h { color: #059669; font-weight: 700; } .sc-m { color: #d97706; font-weight: 700; } .sc-l { color: #dc2626; font-weight: 700; }

    .stat-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-box {
      background: rgba(255,255,255,0.85); backdrop-filter: blur(10px);
      border-radius: 1.4rem; padding: 1.2rem; text-align: center;
      box-shadow: 0 10px 20px rgba(0,0,0,0.04); border-top: 4px solid #10b981;
    }
    .stat-box.abs { border-top-color: #ef4444; } .stat-box.avg { border-top-color: #f59e0b; } .stat-box.best { border-top-color: #3b82f6; }
    .stat-val { font-size: 2rem; font-weight: 800; } .stat-lbl { font-size: 0.7rem; color: #6b7280; font-weight: 700; text-transform: uppercase; margin-top: 4px; }

    .btn {
      background: #6366f1; color: white; border: none; padding: 0.55rem 1.2rem;
      border-radius: 1rem; font-weight: 600; cursor: pointer; font-family: inherit;
      font-size: 0.8rem; transition: all 0.25s; display: inline-flex; align-items: center; gap: 0.3rem;
    }
    .btn:hover { background: #4f46e5; transform: translateY(-2px); box-shadow: 0 8px 15px rgba(79,70,229,0.3); }
    .btn-o { background: white; color: #4f46e5; border: 2px solid #c7d2fe; }
    .btn-o:hover { background: #4f46e5; color: white; }
    .btn-sm { padding: 0.4rem 1rem; font-size: 0.7rem; }
    .btn-icon {
      background: transparent; border: none; color: #4f46e5; font-size: 1rem; cursor: pointer;
      width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      transition: 0.2s;
    }
    .btn-icon:hover { background: #eef2ff; }
    select {
      padding: 0.5rem 1rem; border-radius: 2rem; border: 1px solid #d1d5db; font-weight: 600;
      font-family: inherit; background: white; cursor: pointer;
    }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(6px);
      z-index: 1000; display: flex; align-items: center; justify-content: center;
      opacity: 0; visibility: hidden; transition: 0.3s;
    }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    .modal {
      background: white; border-radius: 2rem; padding: 1.8rem; width: 90%; max-width: 480px;
      max-height: 85vh; overflow-y: auto; box-shadow: 0 30px 50px rgba(0,0,0,0.25);
    }
    .modal-close { cursor: pointer; font-size: 1.2rem; width: 32px; height: 32px; border-radius: 50%; border: none; background: #f3f4f6; }
    .form-group { margin-bottom: 0.8rem; }
    .form-group label { font-size: 0.7rem; font-weight: 700; color: #374151; display: block; margin-bottom: 2px; }
    .form-group input, .form-group textarea { width: 100%; padding: 0.6rem 0.8rem; border: 2px solid #e5e7eb; border-radius: 0.8rem; font-family: inherit; }
    .locked { background: #f3f4f6; color: #6b7280; }

    .loader { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; z-index: 999; flex-direction: column; gap: 12px; }
    .spinner { width: 40px; height: 40px; border: 4px solid #e5e7eb; border-top-color: #4f46e5; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast { position: fixed; bottom: 24px; right: 24px; background: #1f2937; color: white; padding: 0.8rem 1.5rem; border-radius: 1rem; font-weight: 600; z-index: 2000; transform: translateX(120%); transition: 0.3s; }
    .toast.show { transform: translateX(0); } .toast.s { background: #10b981; } .toast.e { background: #ef4444; }

    @media (max-width: 768px) {
      .grid-2 { grid-template-columns: 1fr; } .stat-row { grid-template-columns: repeat(2,1fr); }
      .profile-row { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>
<div class="loader" id="loader"><div class="spinner"></div><span style="font-weight:600;">Loading THP...</span></div>
<div class="toast" id="toast"></div>

<div class="container">
  <!-- Profile Card -->
  <div class="card">
    <div class="profile-row">
      <div class="profile-photo" id="profilePhoto" onclick="document.getElementById('photoInput').click()">
        <span id="photoInitial">S</span>
        <div class="photo-overlay">📷 Change</div>
      </div>
      <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="uploadPhoto(event)">
      <div class="profile-info">
        <h1 id="stuName">———</h1>
        <div style="margin:0.4rem 0 0.6rem">
          <span class="badge badge-roll" id="stuRoll">Roll —</span>
          <span class="badge badge-class" id="stuClass">Class —</span>
        </div>
        <div class="meta">
          <span><i class="fas fa-phone"></i> <span id="stuPhone">—</span></span>
          <span><i class="fas fa-envelope"></i> <span id="stuEmail">—</span></span>
        </div>
        <div class="meta" style="margin-top:0.4rem; gap:1.4rem">
          <span><i class="fas fa-map-marker-alt"></i> <span id="stuAddr">—</span></span>
          <span><i class="fas fa-calendar"></i> <span id="stuDOB">—</span></span>
          <span><i class="fas fa-user"></i> <span id="stuFather">—</span></span>
          <span><i class="fas fa-user"></i> <span id="stuMother">—</span></span>
        </div>
        <button class="btn btn-o btn-sm" style="margin-top:0.8rem" onclick="openEdit()"><i class="fas fa-edit"></i> Edit details</button>
      </div>
    </div>
  </div>

  <!-- Stats (all-time) -->
  <div class="stat-row">
    <div class="stat-box"><div class="stat-val" id="presentDays">0</div><div class="stat-lbl">Present</div></div>
    <div class="stat-box abs"><div class="stat-val" id="absentDays">0</div><div class="stat-lbl">Absent</div></div>
    <div class="stat-box avg"><div class="stat-val" id="avgScore">0%</div><div class="stat-lbl">Avg Score</div></div>
    <div class="stat-box best"><div class="stat-val" id="bestScore">0%</div><div class="stat-lbl">Best Score</div></div>
  </div>

  <!-- Charts & Calendar row -->
  <div class="grid-2">
    <div class="card">
      <h2><i class="fas fa-chart-line"></i> Current month trend</h2>
      <div class="chart-box"><canvas id="scoresChart"></canvas></div>
      <div style="font-size:0.7rem; color:#6b7280; margin-top:4px" id="graphMonthLabel"></div>
    </div>
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.8rem;">
        <button class="btn-icon" id="prevMonthAtt"><i class="fas fa-chevron-left"></i></button>
        <h2 style="margin:0;"><i class="fas fa-calendar-check"></i> <span id="attMonthLabel">April 2026</span></h2>
        <button class="btn-icon" id="nextMonthAtt"><i class="fas fa-chevron-right"></i></button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </div>

  <!-- Scores with month navigation -->
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
      <div style="display:flex; align-items:center; gap:8px;">
        <button class="btn-icon" id="prevMonthScore"><i class="fas fa-chevron-left"></i></button>
        <select id="monthSelect" style="font-weight:600;"></select>
        <button class="btn-icon" id="nextMonthScore"><i class="fas fa-chevron-right"></i></button>
      </div>
      <h2 style="margin:0;"><i class="fas fa-star"></i> Exam scores</h2>
    </div>
    <table style="margin-top:1rem;">
      <thead><tr><th>Exam</th><th>Marks</th><th>%</th><th>Grade</th></tr></thead>
      <tbody id="scoresBody"></tbody>
    </table>
  </div>

  <button class="btn" style="margin-top:0.5rem" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
      <h2>✏️ Edit Details</h2>
      <button class="modal-close" onclick="closeMod('editModal')">✕</button>
    </div>
    <form id="editForm">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.8rem;">
        <div class="form-group"><label>Roll (locked)</label><input class="locked" id="eRoll" disabled></div>
        <div class="form-group"><label>Name (locked)</label><input class="locked" id="eName" disabled></div>
        <div class="form-group"><label>Class (locked)</label><input class="locked" id="eClass" disabled></div>
        <div class="form-group"><label>Phone (locked)</label><input class="locked" id="ePhone" disabled></div>
      </div>
      <hr style="margin:1rem 0; border-color:#e5e7eb;">
      <div class="form-group"><label>📧 Email</label><input type="email" id="eEmail"></div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.8rem;">
        <div class="form-group"><label>🎂 Date of Birth</label><input type="date" id="eDOB"></div>
        <div class="form-group"><label>📍 Address</label><input id="eAddr"></div>
        <div class="form-group"><label>👨 Father</label><input id="eFather"></div>
        <div class="form-group"><label>👩 Mother</label><input id="eMother"></div>
      </div>
      <button type="submit" class="btn" style="width:100%; margin-top:0.8rem;"><i class="fas fa-save"></i> Save changes</button>
    </form>
  </div>
</div>

<script>
  (function() {
    firebase.initializeApp({
      apiKey: "AIzaSyAjjjVn1JO3vVgO89yEqontYxwvi-fnetQ",
      authDomain: "dumbbell-gyme.firebaseapp.com",
      projectId: "dumbbell-gyme",
      storageBucket: "dumbbell-gyme.firebasestorage.app",
      messagingSenderId: "305021976299",
      appId: "1:305021976299:web:fb85c2b332935d698088ae"
    });
    const db = firebase.firestore();
    const IK = '53fb01955a45c5462724b8f7d238500a';
    let scoresChart = null;
    let currentStudentData = null;
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    
    // View state: which month is being displayed for attendance & scores
    let viewMonth = new Date().getMonth(); // 0-11
    let viewYear = new Date().getFullYear();

    const sd = localStorage.getItem('thp_current_student');
    if (!sd) { location.href = 'index.html'; }
    const cur = JSON.parse(sd);

    function toast(m, t = 's') {
      const el = document.getElementById('toast');
      el.textContent = m; el.className = `toast ${t} show`;
      setTimeout(() => el.classList.remove('show'), 2500);
    }
    function openMod(id) { document.getElementById(id).classList.add('active'); }
    function closeMod(id) { document.getElementById(id).classList.remove('active'); }
    document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', function(e) { if (e.target === this) this.classList.remove('active'); }));

    // ---------- Month Navigation ----------
    function changeMonth(delta) {
      viewMonth += delta;
      if (viewMonth < 0) { viewMonth = 11; viewYear--; }
      else if (viewMonth > 11) { viewMonth = 0; viewYear++; }
      refreshMonthSpecificUI();
    }

    function setMonthFromSelect(monthIndex) {
      viewMonth = parseInt(monthIndex);
      refreshMonthSpecificUI();
    }

    // Update calendar, scores table, and month labels
    function refreshMonthSpecificUI() {
      if (!currentStudentData) return;
      const att = currentStudentData.attendance || {};
      const testScores = currentStudentData.testScores || {};

      // Update labels
      document.getElementById('attMonthLabel').textContent = `${MONTHS[viewMonth]} ${viewYear}`;
      document.getElementById('monthSelect').value = viewMonth;

      // Calendar
      renderCalendarForMonth(att, viewYear, viewMonth);
      // Scores table
      renderScoresForMonth(testScores, MONTHS[viewMonth]);
    }

    function renderCalendarForMonth(attendance, year, month) {
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const firstDay = new Date(year, month, 1).getDay();
      let html = '';
      ['S','M','T','W','T','F','S'].forEach(d => html += `<div class="cal-h">${d}</div>`);
      for (let i = 0; i < firstDay; i++) html += '<div></div>';
      
      const today = new Date();
      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const status = attendance?.[dateStr];
        let cls = 'cal-d';
        if (status === 'present') cls += ' cal-p';
        else if (status === 'absent') cls += ' cal-a';
        if (year === today.getFullYear() && month === today.getMonth() && d === today.getDate()) cls += ' cal-t';
        html += `<div class="${cls}">${d}</div>`;
      }
      document.getElementById('calGrid').innerHTML = html;
    }

    function renderScoresForMonth(testScores, monthName) {
      const exams = testScores?.[monthName] || {};
      let html = '';
      if (Object.keys(exams).length === 0) {
        html = '<tr><td colspan="4" style="text-align:center; padding:20px;">No exams this month</td></tr>';
      } else {
        Object.entries(exams).forEach(([examName, data]) => {
          let marks = '-', total = '-', pct = '-', grade = '-', cls = '';
          if (typeof data === 'object' && data !== null) {
            marks = data.marks ?? data.score ?? data.obtained ?? '-';
            total = data.total ?? data.maxMarks ?? data.outOf ?? '-';
            pct = data.percentage ?? data.percent ?? '-';
            if (pct === '-' && marks !== '-' && total !== '-' && Number(total) > 0) {
              pct = Math.round((Number(marks) / Number(total)) * 100);
            }
          } else if (typeof data === 'number') {
            marks = data; total = 100; pct = data;
          }
          if (pct !== '-') {
            const pv = Number(pct);
            if (!isNaN(pv)) {
              if (pv >= 90) { cls = 'sc-h'; grade = 'A+'; }
              else if (pv >= 75) { cls = 'sc-h'; grade = 'A'; }
              else if (pv >= 60) { cls = 'sc-m'; grade = 'B'; }
              else if (pv >= 40) { cls = 'sc-m'; grade = 'C'; }
              else { cls = 'sc-l'; grade = 'F'; }
            }
          }
          html += `<tr><td><strong>📝 ${examName}</strong></td><td>${marks}/${total}</td><td class="${cls}">${pct}%</td><td><span class="${cls}">${grade}</span></td></tr>`;
        });
      }
      document.getElementById('scoresBody').innerHTML = html;
    }

    // Build month dropdown with indicators for months that have exams
    function populateMonthDropdown(testScores) {
      const select = document.getElementById('monthSelect');
      select.innerHTML = '';
      MONTHS.forEach((name, idx) => {
        const hasData = testScores?.[name] && Object.keys(testScores[name]).length > 0;
        const option = document.createElement('option');
        option.value = idx;
        option.textContent = `${name.substring(0,3)} ${hasData ? '•' : ''}`;
        select.appendChild(option);
      });
      select.value = viewMonth;
      select.addEventListener('change', (e) => setMonthFromSelect(e.target.value));
    }

    // Chart: only current month (bar chart of exams)
    function renderCurrentMonthChart(testScores) {
      const ctx = document.getElementById('scoresChart')?.getContext('2d');
      if (!ctx) return;
      if (scoresChart) { scoresChart.destroy(); scoresChart = null; }
      
      const currentMonthName = MONTHS[new Date().getMonth()];
      document.getElementById('graphMonthLabel').textContent = `📊 ${currentMonthName} exams`;
      const exams = testScores?.[currentMonthName] || {};
      const labels = [];
      const dataPoints = [];
      
      Object.entries(exams).forEach(([name, val]) => {
        let pct = null;
        if (typeof val === 'object') pct = val.percentage ?? val.percent;
        else if (typeof val === 'number') pct = val;
        if (pct && !isNaN(Number(pct))) {
          labels.push(name.length > 12 ? name.substring(0,10)+'…' : name);
          dataPoints.push(Number(pct));
        }
      });
      
      if (labels.length === 0) {
        labels.push('No data'); dataPoints.push(0);
      }
      
      scoresChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: 'Score %',
            data: dataPoints,
            backgroundColor: 'rgba(99,102,241,0.7)',
            borderRadius: 8,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: true, max: 100 } }
        }
      });
    }

    // ----- Main loader -----
    async function load() {
      try {
        const doc = await db.collection('students').doc(String(cur.rollNo)).get();
        if (!doc.exists) { document.getElementById('loader').innerHTML = 'Student not found'; return; }
        const d = doc.data();
        currentStudentData = d;

        // Profile
        document.getElementById('stuName').textContent = d.name || '———';
        document.getElementById('stuRoll').textContent = 'Roll ' + d.rollNo;
        document.getElementById('stuClass').textContent = 'Class ' + d.class;
        document.getElementById('stuPhone').textContent = d.phone || '—';
        document.getElementById('stuEmail').textContent = d.email || 'Not set';
        document.getElementById('stuAddr').textContent = d.address || '—';
        document.getElementById('stuDOB').textContent = d.dateOfBirth || '—';
        document.getElementById('stuFather').textContent = d.fatherName ? 'Father: '+d.fatherName : '';
        document.getElementById('stuMother').textContent = d.motherName ? 'Mother: '+d.motherName : '';

        const ph = document.getElementById('profilePhoto');
        if (d.profilePhoto) {
          ph.innerHTML = `<img src="${d.profilePhoto}" alt="profile"><div class="photo-overlay">📷 Change</div>`;
        } else {
          document.getElementById('photoInitial').textContent = (d.name || 'S')[0].toUpperCase();
        }

        // Edit form prefill
        document.getElementById('eRoll').value = d.rollNo||''; document.getElementById('eName').value = d.name||'';
        document.getElementById('eClass').value = d.class||''; document.getElementById('ePhone').value = d.phone||'';
        document.getElementById('eEmail').value = d.email||''; document.getElementById('eDOB').value = d.dateOfBirth||'';
        document.getElementById('eAddr').value = d.address||''; document.getElementById('eFather').value = d.fatherName||'';
        document.getElementById('eMother').value = d.motherName||'';

        // All-time attendance stats
        const att = d.attendance || {};
        let present = 0, absent = 0;
        Object.values(att).forEach(v => { if (v === 'present') present++; else if (v === 'absent') absent++; });
        document.getElementById('presentDays').textContent = present;
        document.getElementById('absentDays').textContent = absent;

        // All-time score stats
        const testScores = d.testScores || {};
        let allPercentages = [];
        Object.values(testScores).forEach(monthData => {
          if (typeof monthData === 'object') {
            Object.values(monthData).forEach(exam => {
              let pct = null;
              if (typeof exam === 'object') pct = exam.percentage ?? exam.percent;
              else if (typeof exam === 'number') pct = exam;
              if (pct && !isNaN(Number(pct))) allPercentages.push(Number(pct));
            });
          }
        });
        if (allPercentages.length) {
          document.getElementById('avgScore').textContent = Math.round(allPercentages.reduce((a,b)=>a+b,0)/allPercentages.length) + '%';
          document.getElementById('bestScore').textContent = Math.max(...allPercentages) + '%';
        } else {
          document.getElementById('avgScore').textContent = '0%';
          document.getElementById('bestScore').textContent = '0%';
        }

        // Initialize month navigation
        populateMonthDropdown(testScores);
        refreshMonthSpecificUI();  // calendar & scores for current viewMonth

        // Current month chart (static)
        renderCurrentMonthChart(testScores);

        // Navigation button listeners
        document.getElementById('prevMonthAtt').addEventListener('click', () => changeMonth(-1));
        document.getElementById('nextMonthAtt').addEventListener('click', () => changeMonth(1));
        document.getElementById('prevMonthScore').addEventListener('click', () => changeMonth(-1));
        document.getElementById('nextMonthScore').addEventListener('click', () => changeMonth(1));

        document.getElementById('loader').style.display = 'none';
      } catch (e) {
        document.getElementById('loader').innerHTML = `Error: ${e.message}`;
      }
    }

    window.uploadPhoto = async function(ev) {
      const f = ev.target.files[0]; if (!f) return;
      if (f.size > 5e6) { toast('Max 5MB', 'e'); return; }
      toast('Uploading...', 's');
      try {
        const fd = new FormData(); fd.append('image', f);
        const r = await fetch(`https://api.imgbb.com/1/upload?key=${IK}`, { method: 'POST', body: fd });
        const j = await r.json();
        if (j.success) {
          await db.collection('students').doc(String(cur.rollNo)).update({ profilePhoto: j.data.url });
          document.getElementById('profilePhoto').innerHTML = `<img src="${j.data.url}"><div class="photo-overlay">📷 Change</div>`;
          toast('Photo updated!', 's');
        }
      } catch (e) { toast('Upload failed', 'e'); }
    };

    window.openEdit = () => openMod('editModal');
    document.getElementById('editForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const update = {
        email: document.getElementById('eEmail').value.trim(),
        dateOfBirth: document.getElementById('eDOB').value,
        address: document.getElementById('eAddr').value.trim(),
        fatherName: document.getElementById('eFather').value.trim(),
        motherName: document.getElementById('eMother').value.trim()
      };
      try {
        await db.collection('students').doc(String(cur.rollNo)).update(update);
        toast('Profile updated', 's');
        closeMod('editModal');
        load();
      } catch (er) { toast('Update failed', 'e'); }
    });

    window.logout = () => { localStorage.removeItem('thp_current_student'); location.href = 'index.html'; };
    load();
  })();
</script>
</body>
</html>
