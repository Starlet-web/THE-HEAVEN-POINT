            --dark: #1e293b;
            --light: #f8fafc;
            --white: #ffffff;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 50%, #f1f5f9 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Animated gradient orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
            animation: float 20s infinite ease-in-out;
            opacity: 0.5;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.3), transparent);
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(244, 63, 94, 0.2), transparent);
            bottom: -100px;
            left: -100px;
            animation-delay: -7s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.2), transparent);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -14s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(50px, -50px) scale(1.1); }
            50% { transform: translate(-30px, 30px) scale(0.9); }
            75% { transform: translate(-50px, -30px) scale(1.05); }
        }

        /* Main login card - WHITE THEME */
        .login-container {
            position: relative;
            z-index: 10;
            width: 440px;
            max-width: 95vw;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 50px 40px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 
                0 25px 60px rgba(0, 0, 0, 0.1),
                0 10px 30px rgba(99, 102, 241, 0.1),
                inset 0 0 30px rgba(255, 255, 255, 0.5);
            animation: cardEntry 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes cardEntry {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Logo & Header */
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            margin: 0 auto 15px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            animation: pulse 2s infinite;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3); }
            50% { box-shadow: 0 10px 50px rgba(99, 102, 241, 0.5); }
        }

        .login-header h1 {
            color: var(--gray-900);
            font-size: 30px;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-header p {
            color: var(--gray-500);
            margin-top: 8px;
            font-size: 14px;
            font-weight: 400;
        }

        /* Input fields - WHITE THEME */
        .input-group {
            margin-bottom: 22px;
            position: relative;
        }

        .input-group .icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            z-index: 2;
            transition: all 0.3s;
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px 16px 52px;
            background: var(--gray-50);
            border: 2px solid var(--gray-200);
            border-radius: 16px;
            color: var(--gray-900);
            font-size: 16px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            font-family: inherit;
        }

        .input-group input::placeholder {
            color: var(--gray-400);
        }

        .input-group input:focus {
            border-color: #6366f1;
            background: #ffffff;
            box-shadow: 
                0 0 0 4px rgba(99, 102, 241, 0.1),
                0 4px 20px rgba(99, 102, 241, 0.1);
        }

        .input-group input:focus ~ .icon {
            transform: translateY(-50%) scale(1.1);
        }

        /* Login button */
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
            font-family: inherit;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(99, 102, 241, 0.4);
        }

        .login-btn:active {
            transform: translateY(-1px);
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* Spinner */
        .spinner {
            display: none;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error message */
        .error-message {
            color: #ef4444;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            display: none;
            padding: 12px;
            background: rgba(239, 68, 68, 0.08);
            border-radius: 12px;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s;
        }

        /* Success message */
        .success-message {
            color: #10b981;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            display: none;
            padding: 12px;
            background: rgba(16, 185, 129, 0.08);
            border-radius: 12px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .success-message.show {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

            margin-top: 25px;
            color: var(--gray-400);

                padding: 35px 25px;
                border-radius: 25px;
            }
            .login-header h1 {
                font-size: 24px;
            }
        }

        async function initializeStudents() {

                        name: student.name,
                        class: student.class,
                        phone: student.phone,
                        password: student.password,
                        profilePhoto: '',
                        address: '',
                        fatherName: '',
                        motherName: '',
                        email: '',
                        bloodGroup: '',
                        dateOfBirth: '',
                        gender: '',
                        admissionDate: '',
                        attendance: {},
                        testScores: {},

                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()

                await batch.commit();
                console.log('✅ All students initialized');
                return true;

            errorDiv.classList.remove('show');
            successDiv.classList.remove('show');

            if (!phone || !password) {
                showError('⚠️ Please enter phone number and password');
                return;
            }

            if (phone.length !== 10 || !/^\d{10}$/.test(phone)) {
                showError('⚠️ Please enter valid 10-digit phone number');
                return;
            }

            btnText.style.display = 'none';
            spinnerEl.style.display = 'block';
            loginBtn.disabled = true;

            try {
                // Admin login check
                if (phone === '9999999999' && password === 'admin123') {
                    localStorage.setItem('thp_admin', JSON.stringify({ role: 'admin', loginTime: new Date().toISOString() }));
                    successDiv.textContent = '✅ Admin login successful! Redirecting...';
                    successDiv.classList.add('show');
                    setTimeout(() => { window.location.href = 'admin.html'; }, 1000);
                    return;
                }

                // Teacher login check
                if (phone === '8888888888' && password === 'teacher123') {
                    localStorage.setItem('thp_teacher', JSON.stringify({ role: 'teacher', loginTime: new Date().toISOString() }));
                    successDiv.textContent = '✅ Teacher login successful! Redirecting...';
                    successDiv.classList.add('show');
                    setTimeout(() => { window.location.href = 'teacher.html'; }, 1000);
                    return;
                }

                // Student login
                let studentDoc = await db.collection('students').doc(phone).get();

                if (!studentDoc.exists) {
                    await initializeStudents();
                    studentDoc = await db.collection('students').doc(phone).get();
                    
                    if (!studentDoc.exists) {
                        showError('❌ Student not found. Contact admin.');
                        resetButton(btnText, spinnerEl, loginBtn);
                        return;
                    }
                }

                const studentData = studentDoc.data();
                
                if (studentData.password === password) {
                    localStorage.setItem('thp_current_student', JSON.stringify({
                        phone: phone,
                        name: studentData.name,
                        class: studentData.class,
                        loginTime: new Date().toISOString()
                    }));
                    
                    btnText.style.display = 'block';
                    btnText.textContent = '✅ Success!';
                    spinnerEl.style.display = 'none';
                    loginBtn.style.background = 'linear-gradient(135deg, #10b981, #059669)';
                    
                    successDiv.textContent = `Welcome ${studentData.name}! Redirecting...`;
                    successDiv.classList.add('show');
                    
                    setTimeout(() => { window.location.href = 'student-dashboard.html'; }, 800);
                } else {
                    showError('🔒 Invalid password. Default is 12345678');
                    resetButton(btnText, spinnerEl, loginBtn);
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('🌐 Connection error. Please try again.');
                resetButton(btnText, spinnerEl, loginBtn);
            }
        });

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 5000);
        }

        function resetButton(btnText, spinnerEl, loginBtn) {
            btnText.style.display = 'block';
            btnText.textContent = '🚀 Sign In';
            spinnerEl.style.display = 'none';
            loginBtn.disabled = false;
            loginBtn.style.background = 'linear-gradient(135deg, #6366f1, #8b5cf6)';
        }

        // Auto-init on load
        (async function() {
            try {
                const snapshot = await db.collection('students').limit(1).get();
                if (snapshot.empty) {
                    console.log('🔄 First time setup...');
                    await initializeStudents();
                }
            } catch (error) {
                console.log('⚠️ Will init on first login');
            }
        })();

        console.log('🚀 THP Portal Ready');
        console.log('📱 Student Login: Phone + 12345678');
        console.log('👑 Admin Login: 9999999999 + admin123');
        console.log('👨‍🏫 Teacher Login: 8888888888 + teacher123');
    </script>
</body>
</html>
