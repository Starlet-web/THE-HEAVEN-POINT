    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --secondary: #f43f5e;
            --dark: #1e293b;
            --light: #f8fafc;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f9fafb, #f3f4f6);
            overflow-x: hidden;
        }
        
        .fade { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .form-input, .form-select {
            transition: all 0.3s ease;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }
        .form-input:focus, .form-select:focus { box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3); }
        
        .btn-primary {
            background-image: linear-gradient(to right, var(--primary), var(--primary-dark));
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.3), 0 2px 4px -1px rgba(99, 102, 241, 0.2);
            cursor: pointer;
        }
        .btn-primary:hover {
            background-image: linear-gradient(to right, var(--primary-dark), var(--primary));
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3), 0 4px 6px -2px rgba(99, 102, 241, 0.2);
        }
        .btn-primary:active { transform: translateY(0); }
        
        .floating-label {
            position: absolute; top: 0; left: 0;
            transform: translate(12px, 12px);
            transition: all 0.2s ease-out;
            pointer-events: none; color: #64748b; font-size: 14px;
        }
        .input-filled+.floating-label,
        .form-input:focus+.floating-label,
        .form-select:focus+.floating-label {
            transform: translate(8px, -8px) scale(0.85);
            background-color: white; padding: 0 4px; color: var(--primary);
        }
        .input-group { position: relative; }
        
        .form-select {
            appearance: none; -webkit-appearance: none; cursor: pointer;
        }
        
        .select-arrow {
            position: absolute; right: 14px; top: 50%;
            transform: translateY(-50%); color: #94a3b8;
            pointer-events: none; font-size: 14px; transition: all 0.3s ease;
        }
        .input-group:focus-within .select-arrow { color: var(--primary); }
        
        .loader {
            width: 48px; height: 48px;
            border: 5px solid #e0e7ff;
            border-bottom-color: var(--primary);
            border-radius: 50%; display: inline-block;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .card {
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            border: 1px solid rgba(209, 213, 219, 0.3);
            max-height: 90vh; overflow-y: auto;
            scrollbar-width: thin; scrollbar-color: var(--primary) #f1f1f1;
        }
        
        .wave {
            position: fixed; bottom: 0; left: 0; width: 100%;
            overflow: hidden; line-height: 0; transform: rotate(180deg); z-index: -1;
        }
        .wave svg { position: relative; display: block; width: calc(100% + 1.3px); height: 150px; }
        .wave .shape-fill { fill: rgba(99, 102, 241, 0.1); }
        
        .clickable { cursor: pointer; transition: all 0.2s ease; }
        .clickable:hover { opacity: 0.9; transform: scale(1.02); }
        
        @keyframes blob {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(20px, -20px) scale(1.1); }
            50% { transform: translate(-20px, 10px) scale(0.9); }
            75% { transform: translate(10px, 10px) scale(1.05); }
        }
        .animate-blob { animation: blob 20s infinite; }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
        
        @media (max-height: 700px) { .card { max-height: 80vh; } }

                <!-- Class -->

                    <div class="relative">

                    </div>
                </div>

                <!-- Roll Number -->

                    <div class="relative">

                        <input type="number" id="rollNo" class="form-input w-full p-3 pl-10 border border-gray-200 rounded-lg focus:outline-none" min="1" max="100" autocomplete="off" required />
                        <label class="floating-label left-10">Roll Number</label>
                    </div>
                </div>

                <!-- Password -->

                    <div class="relative">

            { rollNo: 89, name: "Niti Singh Rathore", class: "1", phone: "9219140451", password: "12345678" },
            { rollNo: 90, name: "Satvik Chaurasia", class: "1", phone: "7499513825", password: "12345678" }
        ];

        // Init Firestore
        async function initializeStudents() {
            try {
                const batch = db.batch();
                allStudents.forEach(s => {
                    batch.set(db.collection('students').doc(String(s.rollNo)), {
                        rollNo: s.rollNo, name: s.name, class: s.class,
                        phone: s.phone, password: s.password,
                        profilePhoto: '', email: '', address: '',
                        fatherName: '', motherName: '', bloodGroup: '',
                        dateOfBirth: '', gender: '',
                        attendance: {}, testScores: {},
                        performance: { strengths: '', weaknesses: '', remarks: '' },
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });
                });
                await batch.commit();
                return true;
            } catch (e) { return false; }
        }

        function showMessage(msg, bg = 'bg-green-600') {
            const p = document.getElementById('popupMessage');
            p.textContent = msg;
            p.className = `block mt-4 text-center text-white px-4 py-3 rounded-lg transition-all duration-300 shadow-lg ${bg}`;
            p.classList.remove('hidden');
            setTimeout(() => p.classList.add('hidden'), 3000);
        }

        function resetButton() {
            document.getElementById('btnText').textContent = 'Sign In';
            document.getElementById('spinner').classList.add('hidden');
            document.getElementById('loginBtn').disabled = false;
        }

        // LOGIN - Phone + Class + Roll No. + Password
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const phone = document.getElementById('phone').value.trim();
            const studentClass = document.getElementById('studentClass').value;
            const rollNo = document.getElementById('rollNo').value.trim();
            const password = document.getElementById('password').value.trim();
            const spinner = document.getElementById('spinner');
            const loginBtn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');

            if (!phone || !studentClass || !rollNo || !password) {
                showMessage('Fill all 4 fields: Phone, Class, Roll No., Password', 'bg-red-500');
                return;
            }
            if (phone.length !== 10 || !/^\d{10}$/.test(phone)) {
                showMessage('Enter valid 10-digit phone', 'bg-red-500');
                return;
            }

            btnText.textContent = 'Signing in...';
            spinner.classList.remove('hidden');
            loginBtn.disabled = true;

            try {
                // Admin
                if (phone === '9999999999' && password === 'admin123') {
                    localStorage.setItem('thp_admin', JSON.stringify({ role: 'admin', loginTime: new Date().toISOString() }));
                    showMessage('✅ Admin!'); setTimeout(() => window.location.replace('admin.html'), 500); return;
                }
                // Teacher
                if (phone === '8888888888' && password === 'teacher123') {
                    localStorage.setItem('thp_teacher', JSON.stringify({ role: 'teacher', loginTime: new Date().toISOString() }));
                    showMessage('✅ Teacher!'); setTimeout(() => window.location.replace('teacher.html'), 500); return;
                }

                // Check DB
                const checkSnap = await db.collection('students').limit(1).get();
                if (checkSnap.empty) await initializeStudents();

                // DIRECT FETCH by Roll Number (unique ID)
                const doc = await db.collection('students').doc(String(rollNo)).get();

                if (!doc.exists) {
                    showMessage('Student not found. Check Roll Number.', 'bg-red-500');
                    resetButton(); return;
                }

                const data = doc.data();

                // Verify ALL 4 fields match
                if (data.phone !== phone) {
                    showMessage('Phone number does not match this Roll No.', 'bg-red-500');
                    resetButton(); return;
                }
                if (data.class !== studentClass) {
                    showMessage('Class does not match this Roll No.', 'bg-red-500');
                    resetButton(); return;
                }
                if (data.password !== password) {
                    showMessage('Wrong password. Default: 12345678', 'bg-red-500');
                    resetButton(); return;
                }

                // ✅ SUCCESS!
                localStorage.setItem('thp_current_student', JSON.stringify({
                    rollNo: data.rollNo, phone: data.phone,
                    name: data.name, class: data.class,
                    loginTime: new Date().toISOString()
                }));

                showMessage(`✅ Welcome ${data.name}!`);
                btnText.textContent = '✓ Signed In';
                spinner.classList.add('hidden');
                setTimeout(() => window.location.replace('student-dashboard.html'), 500);

            } catch (err) {
                showMessage('Connection error', 'bg-red-500');
                resetButton();
            }
        });

        // Pre-flight
        (async () => {
            try { const snap = await db.collection('students').limit(1).get(); if (snap.empty) await initializeStudents(); } catch (_) {}
        })();
    </script>
</body>
</html>
